<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mitko Koch Bells v2</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:radial-gradient(circle,#5b1d00,#1b0900);color:#fff}
.app{max-width:420px;margin:auto;padding:10px}
.logo{text-align:center;font-size:26px;font-weight:900;color:#ffcc3d}

.machine{border:3px solid #ffcc3d;border-radius:15px;background:#1a0800;padding:10px}
.reels{display:grid;grid-template-columns:repeat(5,1fr);gap:3px}
.reel{display:grid;grid-template-rows:repeat(3,70px);gap:3px}
.cell{border:1px solid #ffcc3d;background:#2a0a00;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900}

.bell small{display:block;background:#fff;color:#000;border-radius:6px;font-size:11px;padding:2px}

.controls{text-align:center;margin-top:10px}
button{padding:10px 20px;border:0;border-radius:8px;font-weight:900}
.spin{background:#ff4b1f;color:white}

.status{text-align:center;margin:10px;font-weight:900}

.boil{animation:boil .15s infinite alternate}
@keyframes boil{
from{transform:translateX(-2px)}
to{transform:translateX(2px)}
}
</style>
</head>

<body>

<div class="app">
<div class="logo">👨‍🍳 MITKO BELLS 🔔</div>

<div class="machine" id="machine">
<div class="reels" id="reels"></div>
</div>

<div class="status" id="status">ГОТОВ</div>

<div class="controls">
<button class="spin" onclick="spin()">SPIN</button>
</div>

</div>

<script>

let balance=20;
let inBonus=false;
let respins=0;
let total=0;

const symbols=["🍲","🔪","🥩","🧂","🔥"];

function randBell(){
let vals=[0.2,0.5,1,2,3,5];
return vals[Math.floor(Math.random()*vals.length)];
}

function makeBoard(){
let b=[];
for(let r=0;r<3;r++){
b[r]=[];
for(let c=0;c<5;c++){

if(Math.random()<0.15){
b[r][c]={id:"BELL",v:randBell()};
}else{
b[r][c]={id:"SYM",v:0};
}

}
}
return b;
}

function draw(b){
reels.innerHTML="";
for(let c=0;c<5;c++){
let reel=document.createElement("div");
reel.className="reel";

for(let r=0;r<3;r++){
let cell=document.createElement("div");
cell.className="cell";

let obj=b[r][c];

if(obj.id==="BELL"){
cell.innerHTML=`<div class="bell">🔔<small>${obj.v}€</small></div>`;
}else{
cell.innerHTML=symbols[Math.floor(Math.random()*symbols.length)];
}

reel.appendChild(cell);
}
reels.appendChild(reel);
}
}

function countBells(b){
let n=0;
for(let r=0;r<3;r++)for(let c=0;c<5;c++)if(b[r][c].id==="BELL")n++;
return n;
}

function collect(b){
let got=0;

for(let r=0;r<3;r++){
for(let c=0;c<5;c++){
if(b[r][c].id==="BELL"){
total+=b[r][c].v;
got++;
kitchenDing();
}
}
}

return got;
}

function kitchenDing(){
beep(1200,.05,"triangle");
setTimeout(()=>beep(1500,.05,"triangle"),80);
}

function beep(f,d,t){
let c=new (window.AudioContext||window.webkitAudioContext)();
let o=c.createOscillator(),g=c.createGain();
o.type=t;
o.frequency.value=f;
g.gain.value=.05;
o.connect(g);g.connect(c.destination);
o.start();
o.stop(c.currentTime+d);
}

function spin(){

let b=makeBoard();
draw(b);

if(inBonus){

respins--;
let got=collect(b);

if(got>0){
respins=3;
machine.classList.add("boil");
setTimeout(()=>machine.classList.remove("boil"),500);
status.innerText="🔔 МИТКО ДОБАВИ КАМБАНИ!";
}else{
status.innerText="НЯМА КАМБАНА...";
}

if(respins<=0){
inBonus=false;
status.innerText="🍲 ОБЩО: "+total+"€";
balance+=total;
total=0;
}

return;
}

let bells=countBells(b);

if(bells>=5){
inBonus=true;
respins=3;
total=0;

collect(b);

machine.classList.add("boil");
setTimeout(()=>machine.classList.remove("boil"),1200);

status.innerText="🔥 БОНУС! СЪБИРАЙ КАМБАНИ!";
return;
}

status.innerText="СПИН...";
}

draw(makeBoard());

</script>

</body>
</html>
