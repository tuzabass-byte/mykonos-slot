<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Slot Demo</title>
<style>
body {
    margin: 0;
    background: #0b1a3a;
    font-family: Arial;
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

.jackpot {
    font-size: 30px;
    margin: 10px;
}

.slot {
    display: flex;
    justify-content: center;
    margin: 20px 0;
}

.reel {
    width: 80px;
    height: 80px;
    margin: 5px;
    background: black;
    border: 3px solid gold;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    background: red;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="container">

<div class="jackpot">💎 Mega: 12928.23</div>
<div class="jackpot" style="color:lime;">Maxi: 647.31</div>
<div class="jackpot" style="color:lightblue;">Mini: 42.52</div>

<div class="slot" id="slot">
    <div class="reel">🍒</div>
    <div class="reel">🍋</div>
    <div class="reel">🍇</div>
    <div class="reel">🔔</div>
    <div class="reel">7️⃣</div>
</div>

<button onclick="spin()">SPIN</button>

<h2 id="result"></h2>

</div>

<script>
const symbols = ["🍒","🍋","🍇","🔔","7️⃣","💎"];

function spin() {
    let reels = document.querySelectorAll(".reel");
    let result = [];

    reels.forEach(reel => {
        let rand = symbols[Math.floor(Math.random() * symbols.length)];
        reel.textContent = rand;
        result.push(rand);
    });

    checkWin(result);
}

function checkWin(res) {
    let win = res.every(v => v === res[0]);
    document.getElementById("result").textContent = win ? "🎉 WIN!" : "";
}
</script>

</body>
</html>
