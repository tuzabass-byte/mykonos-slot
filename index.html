<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friends Bet Casino</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#050505;color:white;font-family:Arial;text-align:center}
button{padding:10px;margin:5px;border:none;border-radius:8px;background:red;color:white;cursor:pointer}
input{padding:10px;margin:5px;border-radius:6px;border:none}
.game{margin-top:40px;padding:20px;background:#111;border-radius:15px}
</style>
</head>

<body>

<h1>🎰 Friends Bet Casino</h1>

<div id="user">Не си влязъл</div>
<div id="balance">Баланс: 0</div>

<br>

<input id="name" placeholder="Name">
<input id="pin" placeholder="PIN" type="password"><br>

<button onclick="login()">Вход</button>
<button onclick="register()">Регистрация</button>
<button onclick="logout()">Изход</button>

<div class="game">
  <h2>Lucky Fruits</h2>
  <button onclick="play()">ИГРАЙ</button>
</div>

<script>
// ✅ ТВОИТЕ ДАННИ
const supabase = window.supabase.createClient(
  "https://xjcvntplrbjsaozkduqd.supabase.co",
  "sb_publishable_EmZ_3ANedid8beyhVypb9Q_cGj5RMnq"
);

let currentUser = null;

// REGISTER
async function register(){
  let name = document.getElementById("name").value;
  let pin = document.getElementById("pin").value;

  const { error } = await supabase
    .from("players")
    .insert([{ Name: name, Pin: pin, balance: 1000 }]);

  if(error){
    alert("грешка или вече съществува");
  }else{
    alert("регистриран!");
  }
}

// LOGIN
async function login(){
  let name = document.getElementById("name").value;
  let pin = document.getElementById("pin").value;

  const { data, error } = await supabase
    .from("players")
    .select("*")
    .eq("Name", name)
    .eq("Pin", pin)
    .single();

  if(data){
    currentUser = data;
    update();
  }else{
    alert("Грешен Name или PIN");
  }
}

// LOGOUT
function logout(){
  currentUser = null;
  update();
}

// UPDATE UI
function update(){
  if(currentUser){
    document.getElementById("user").innerText = "Добре дошъл " + currentUser.Name;
    document.getElementById("balance").innerText = "Баланс: " + currentUser.balance;
  }else{
    document.getElementById("user").innerText = "Не си влязъл";
    document.getElementById("balance").innerText = "Баланс: 0";
  }
}

// PLAY GAME
function play(){
  if(!currentUser){
    alert("влез първо");
    return;
  }
  window.location.href = "vasa-fortune.html";
}

update();
</script>

</body>
</html>
