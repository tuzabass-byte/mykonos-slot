<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vasa Fortune V26</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#15558f,#061943 40%,#020817);color:#fff}
.app{max-width:430px;margin:auto;padding:12px 10px 92px}
.logo{text-align:center;font-size:27px;font-weight:900;color:#36f3ff;text-shadow:0 0 18px #00eaff}
.sub{text-align:center;color:#ffd35a;margin:4px 0 8px;font-size:13px}
.jackpot{height:42px;border:2px solid #36f1ff;border-radius:12px;background:#031632;margin:5px 0;display:flex;justify-content:space-between;align-items:center;padding:0 14px;font-size:18px;font-weight:900;box-shadow:0 0 12px #00eaff}
.freeBox{display:none;background:#ffe15a;color:#111;text-align:center;font-weight:900;padding:8px;border-radius:9px;margin:7px 0}
.machine{border:3px solid #ffd23c;border-radius:15px;overflow:hidden;background:#21001b;box-shadow:0 0 22px rgba(255,208,40,.75)}
.title{background:linear-gradient(90deg,#9b0000,#ff5200,#9b0000);padding:10px;text-align:center;color:#ffe15a;font-size:22px;font-weight:900;border-bottom:3px solid #ffd23c}
.reels{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;padding:6px;background:#280023;border-bottom:3px solid #ffd23c}
.reel{display:grid;grid-template-rows:repeat(3,64px);gap:3px}
.cell{border:1px solid #ffd85a;background:radial-gradient(circle,#884311,#310033 52%,#120013);display:flex;align-items:center;justify-content:center;font-size:31px;font-weight:900}
.cell.win{background:gold;color:#111;animation:flash .35s infinite alternate}
.cell.scatter{background:radial-gradient(circle,#fff700,#ff9900);color:#111;font-size:23px}
.spin .cell{animation:blur .08s linear infinite}
@keyframes blur{from{filter:blur(2px);transform:translateY(-8px)}to{filter:blur(2px);transform:translateY(8px)}}
@keyframes flash{to{box-shadow:inset 0 0 28px white;filter:brightness(1.7)}}
.info{background:#080611;padding:9px}
.status{text-align:center;font-size:18px;font-weight:900;min-height:28px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:7px}
.stat{border:1px solid #6e7490;border-radius:8px;background:#090814;text-align:center;padding:6px 2px}
.stat small{display:block;color:#ccc;font-size:10px}.stat b{font-size:18px}
.controls{display:flex;justify-content:space-around;align-items:center;margin-top:13px}
button{border:0;color:white;font-weight:900;cursor:pointer}
button:active{transform:scale(.94)}
.betBtn{width:62px;height:62px;border-radius:50%;border:4px solid white;background:radial-gradient(circle,#16f2ff,#003b88)}
.spinBtn{width:96px;height:96px;border-radius:50%;border:6px solid white;background:radial-gradient(circle,#ff2020,#790000);font-size:18px;box-shadow:0 0 24px red}
.extra{text-align:center;margin-top:8px}
.small{padding:9px 12px;border-radius:8px;background:#112a67;border:1px solid #37eaff;margin:3px}
.bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:430px;width:100%;height:74px;background:#071b50;display:grid;grid-template-columns:repeat(5,1fr)}
.nav{text-align:center;font-size:11px;padding-top:7px;color:#c5cdec}.nav div{font-size:22px}
.deposit{margin:13px 5px;border-radius:10px;background:#2cf5f2;color:#061943;display:flex;align-items:center;justify-content:center;font-weight:900}
.popup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;align-items:center;justify-content:center;padding:20px}
.popupBox{background:#081331;border:3px solid #36f1ff;border-radius:16px;padding:20px;text-align:center;box-shadow:0 0 25px #00eaff;max-width:360px}
.popupBox h2{color:#ffe15a;margin:0 0 12px}
.popupBox button{background:#ff2020;border-radius:8px;padding:12px 25px;margin-top:15px}
</style>
</head>
<body>

<div class="app">
  <div class="logo">VASA FORTUNE</div>
  <div class="sub">Demo баланс · 5 линии · 30 Free Spins</div>

  <div class="jackpot"><span style="color:#ff4ee6">Mega</span><span id="mega">12928.65 €</span></div>
  <div class="jackpot"><span style="color:#54ff65">Maxi</span><span id="maxi">647.45 €</span></div>
  <div class="jackpot"><span style="color:#c9f7ff">Mini</span><span id="mini">42.66 €</span></div>

  <div class="freeBox" id="freeBox"></div>

  <div class="machine">
    <div class="title">🔥 VASA FORTUNE 🔥</div>
    <div class="reels" id="reels"></div>
    <div class="info">
      <div class="status" id="status">ГОТОВ</div>
      <div class="stats">
        <div class="stat"><small>ПЕЧАЛБА</small><b id="win">0.00 €</b></div>
        <div class="stat"><small>ЗАЛОГ</small><b id="bet">0.50 €</b></div>
        <div class="stat"><small>БАЛАНС</small><b id="bal">20.00 €</b></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="betBtn" onclick="changeBet(-1)">BET -</button>
    <button class="spinBtn" id="spinButton" onclick="spin()">SPIN</button>
    <button class="betBtn" onclick="changeBet(1)">BET +</button>
  </div>

  <div class="extra">
    <button class="small" onclick="paytable()">PAYTABLE</button>
    <button class="small" id="soundBtn" onclick="toggleSound()">SOUND ON</button>
  </div>
</div>

<div class="bottom">
  <div class="nav"><div>🏝️</div>Начало</div>
  <div class="nav"><div>▦</div>Игри</div>
  <div class="nav" onclick="bonus()"><div>🎁</div>Бонуси</div>
  <div class="nav"><div>♡</div>Любими</div>
  <div class="deposit" onclick="deposit()">Депозит</div>
</div>

<div class="popup" id="popup">
  <div class="popupBox">
    <h2 id="popupTitle">БРАВО!</h2>
    <div id="popupText"></div>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script>
const START_BALANCE=20;
const SOFT_LIMIT=30;

let balance=START_BALANCE;
let bets=[0.10,0.20,0.50,1,2,5,10];
let bi=2;

let spinning=false;
let snd=true;

let inFree=false;
let free=0,totalFree=0,freeWin=0,lastBet=bets[bi];

let jp={mega:12928.65,maxi:647.45,mini:42.66};

const pay={
"7":{3:10,4:40,5:600},
"BAR":{3:8,4:20,5:100},
"D":{3:8,4:20,5:100},
"B":{3:6,4:15,5:50},
"H":{3:4,4:10,5:30},
"C":{3:2,4:6,5:20}
};

const symbols=["7","BAR","D","B","H","C"];

function m(v){return Number(v).toFixed(2)+" €"}

function setCell(c,id){
c.dataset.id=id;
c.className="cell";
if(id==="S"){c.innerHTML="SC";c.classList.add("scatter");return;}
if(id==="W"){c.innerHTML="W";return;}
if(id==="7")c.innerHTML="7";
if(id==="BAR")c.innerHTML="BAR";
if(id==="D")c.innerHTML="💎";
if(id==="B")c.innerHTML="🔔";
if(id==="H")c.innerHTML="♞";
if(id==="C")c.innerHTML="🍒";
}

function drawBoard(board){
reels.innerHTML="";
for(let c=0;c<5;c++){
let reel=document.createElement("div");
reel.className="reel";
for(let r=0;r<3;r++){
let cell=document.createElement("div");
setCell(cell,board[r][c]);
reel.appendChild(cell);
}
reels.appendChild(reel);
}
}

function emptyBoard(){
let b=[];
for(let r=0;r<3;r++){
b[r]=[];
for(let c=0;c<5;c++){
b[r][c]=symbols[Math.floor(Math.random()*symbols.length)];
}
}
return b;
}

/* 🎯 OUTCOME FIRST */
function generateOutcome(){
let betv=bets[bi];

let r=Math.random();

if(balance>=SOFT_LIMIT) r*=0.4; // сухо след 30€

if(r<0.03 && !inFree){
return {type:"bonus"};
}

if(r<0.18){
let sym=symbols[Math.floor(Math.random()*symbols.length)];
let count=3;
let win=betv*pay[sym][3];
return {type:"win",sym,count,win};
}

return {type:"lose"};
}

function buildBoard(outcome){
let b=emptyBoard();

if(outcome.type==="win"){
let row=Math.floor(Math.random()*3);
for(let i=0;i<outcome.count;i++){
b[row][i]=outcome.sym;
}
}

if(outcome.type==="bonus"){
for(let i=0;i<3;i++){
b[i][i]="S";
}
}

return b;
}

function spin(){
if(spinning)return;

let betv=bets[bi];

if(!inFree && balance<betv)return;

spinning=true;

if(!inFree){
balance-=betv;
lastBet=betv;
}

let outcome=generateOutcome();
let board=buildBoard(outcome);

drawBoard(board);

setTimeout(()=>{
applyOutcome(outcome);
spinning=false;
},300);
}

function applyOutcome(o){

if(o.type==="bonus"){
startFree();
return;
}

if(o.type==="win"){
win.innerText=m(o.win);

if(inFree){
freeWin+=o.win;
}else{
balance+=o.win;
}

status.innerText="ПЕЧАЛБА "+m(o.win);
}else{
status.innerText="ОПИТАЙ ПАК";
}

update();

if(inFree){
free--;
if(free<=0)endFree();
}
}

function startFree(){
inFree=true;
free=30;
totalFree=30;
freeWin=0;
status.innerText="FREE SPINS!";
update();
}

function endFree(){
inFree=false;
balance+=freeWin;
status.innerText="FREE WIN "+m(freeWin);
freeWin=0;
update();
}

function update(){
bet.innerText=m(bets[bi]);
bal.innerText=m(balance);
freeBox.style.display=inFree?"block":"none";
freeBox.innerText=`FREE SPINS: ${totalFree-free}/${totalFree} · WIN: ${m(freeWin)}`;
}

function changeBet(d){
if(inFree)return;
bi=Math.max(0,Math.min(bets.length-1,bi+d));
update();
}

function deposit(){
balance=START_BALANCE;
update();
}

function toggleSound(){snd=!snd}

function paytable(){alert("OK")}

drawBoard(emptyBoard());
update();
</script>
</body>
</html>
