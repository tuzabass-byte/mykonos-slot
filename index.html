<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DIDI BLITZ</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:linear-gradient(#111,#000);color:#fff}
.app{max-width:430px;margin:auto;padding:10px}
.logo{text-align:center;font-size:28px;font-weight:900;color:#ffcc00;text-shadow:0 0 10px red}

.machine{border:3px solid yellow;border-radius:12px;background:#111;box-shadow:0 0 15px red}
.reels{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:6px}
.reel{display:grid;grid-template-rows:repeat(3,60px);gap:3px}

.cell{
border:1px solid yellow;
background:#000;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
}

.cell.win{background:yellow;color:black}

.spinBtn{
width:90px;height:90px;
border-radius:50%;
background:red;
color:white;
font-weight:bold;
margin:10px auto;
display:block;
}

.stats{text-align:center;margin-top:10px}
</style>
</head>

<body>

<div class="app">
<div class="logo">🚨 DIDI BLITZ 🚨</div>

<div class="machine">
<div id="reels" class="reels"></div>
</div>

<div class="stats">
<div>WIN: <span id="win">0</span></div>
<div>BET: <span id="bet">1</span></div>
<div>BAL: <span id="bal">20</span></div>
</div>

<button class="spinBtn" onclick="spin()">SPIN</button>
</div>

<script>

let balance=20;
let bet=1;

const symbols=[
"🚗", // car
"📸", // camera
"🚓", // police
"30", // speed
"50",
"100",
"💶" // fine
];

function rand(){
let r=Math.random();

if(r<0.4)return "🚗";
if(r<0.6)return "30";
if(r<0.75)return "50";
if(r<0.88)return "🚓";
if(r<0.96)return "📸";
if(r<0.99)return "💶";
return "100";
}

function draw(board){
reels.innerHTML="";
board.forEach(s=>{
let d=document.createElement("div");
d.className="cell";
d.innerText=s;
reels.appendChild(d);
});
}

function spin(){

if(balance<bet)return;

balance-=bet;

let board=[];
for(let i=0;i<15;i++){
board.push(rand());
}

draw(board);

let winVal=0;

/* simple lines */
for(let i=0;i<3;i++){
if(board[i]===board[i+3] && board[i]===board[i+6]){
winVal+=bet*2;
}
}

/* bonus camera */
let cameras=board.filter(x=>x==="📸").length;
if(cameras>=3){
winVal+=bet*10;
alert("📸 CAUGHT BY RADAR! BONUS!");
}

/* police boost */
if(board.includes("🚓")){
winVal*=1.5;
}

balance+=winVal;

win.innerText=winVal.toFixed(2);
bal.innerText=balance.toFixed(2);
}

draw(Array(15).fill("🚗"));

</script>
</body>
</html>
