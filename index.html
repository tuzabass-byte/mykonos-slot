<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mykonos Hot</title>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#1d5f1d,#000);
color:#fff;
text-align:center;
}

.wrap{max-width:420px;margin:auto;padding:10px;}

.title{
font-size:28px;
color:gold;
margin:10px 0;
}

.machine{
background:#111;
border:3px solid gold;
border-radius:15px;
padding:10px;
}

.reels{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:5px;
}

.reel{
display:grid;
grid-template-rows:repeat(3,80px);
gap:5px;
}

.cell{
background:#000;
border:2px solid gold;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
margin-top:10px;
}

.stats div{
background:#000;
padding:6px;
border-radius:8px;
}

button,select{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
}

button{
background:gold;
font-weight:bold;
}

.msg{
margin-top:10px;
background:#7a1c1c;
padding:6px;
border-radius:8px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="title">🔥 MYKONOS HOT 🔥</div>

<div class="machine">

<div class="reels" id="reels"></div>

<div class="stats">
<div>COINS<br><b id="coins">1000</b></div>
<div>FREE<br><b id="free">0</b></div>
<div>WIN<br><b id="win">0</b></div>
</div>

<select id="bet">
<option value="10">10</option>
<option value="20">20</option>
<option value="50">50</option>
</select>

<button onclick="spin()">SPIN</button>

<div id="msg" class="msg"></div>

</div>

</div>

<script>
let coins=1000;
let free=0;

const symbols=["7️⃣","🍒","🍋","🍇","🔔","BAR","💥"];
const scatter="💥";

let audioCtx;

function beep(f){
if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
const o=audioCtx.createOscillator();
const g=audioCtx.createGain();
o.frequency.value=f;
o.connect(g); g.connect(audioCtx.destination);
o.start();
setTimeout(()=>o.stop(),100);
}

function spinSound(){beep(200);setTimeout(()=>beep(300),100);}
function winSound(){beep(600);setTimeout(()=>beep(800),100);}
function freeSound(){beep(900);}

function randomSymbol(){
return Math.random()<0.05?scatter:symbols[Math.floor(Math.random()*6)];
}

function randomMatrix(){
let m=[];
for(let r=0;r<3;r++){
let row=[];
for(let c=0;c<5;c++) row.push(randomSymbol());
m.push(row);
}
return m;
}

function draw(m){
reels.innerHTML="";
for(let c=0;c<5;c++){
let reel=document.createElement("div");
reel.className="reel";
for(let r=0;r<3;r++){
let cell=document.createElement("div");
cell.className="cell";
cell.textContent=m[r][c];
reel.appendChild(cell);
}
reels.appendChild(reel);
}
}

function countScatter(m){
let c=0;
m.forEach(r=>r.forEach(v=>{if(v==scatter)c++;}));
return c;
}

function evaluate(m,bet){
let win=0;
for(let r=0;r<3;r++){
let first=m[r][0];
let count=1;
for(let i=1;i<5;i++){
if(m[r][i]==first) count++;
else break;
}
if(count>=3) win+=count*10*bet/10;
}
return win;
}

async function spin(){

spinSound();

let bet=+betEl.value;

if(free>0) free--;
else{
if(coins<bet){msg("Нямаш coins");return;}
coins-=bet;
}

let final=randomMatrix();
let temp=randomMatrix();

draw(temp);

// въртене по колони (реално казино усещане)
for(let c=0;c<5;c++){

for(let i=0;i<6;i++){
await new Promise(r=>setTimeout(r,70));

for(let r=0;r<3;r++){
temp[r][c]=randomSymbol();
}

draw(temp);
}

// стоп на колоната
for(let r=0;r<3;r++){
temp[r][c]=final[r][c];
}

draw(temp);
await new Promise(r=>setTimeout(r,100));
}

let win=evaluate(final,bet);
let sc=countScatter(final);

if(sc>=3){
free+=8;
freeSound();
msg("FREE SPINS +8");
}

if(win>0){
coins+=win;
winSound();
msg("Печалба "+win);
}else{
msg("Нищо");
}

coinsEl.textContent=coins;
freeEl.textContent=free;
winEl.textContent=win;
}

function msg(t){
msgEl.textContent=t;
}

draw(randomMatrix());
</script>

</body>
</html>
