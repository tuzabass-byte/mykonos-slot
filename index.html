<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mykonos Casino</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0b3d91, #1e90ff);
      color: white;
      text-align: center;
      padding: 20px;
    }
    .box {
      max-width: 520px;
      margin: 30px auto;
      background: rgba(255,255,255,0.12);
      padding: 24px;
      border-radius: 18px;
      box-sizing: border-box;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      background: gold;
      font-weight: bold;
      cursor: pointer;
    }
    .hidden { display: none; }
    #result {
      font-size: 34px;
      margin: 18px 0;
    }
  </style>
</head>
<body>
  <div class="box" id="loginBox">
    <h1>Mykonos Casino</h1>
    <p>Влез с твоето име и PIN</p>
    <input id="playerName" placeholder="Име" />
    <input id="playerPin" placeholder="PIN" type="password" />
    <button onclick="login()">Влез</button>
    <p id="loginMsg"></p>
  </div>

  <div class="box hidden" id="gameBox">
    <h2 id="welcome"></h2>
    <p>Точки: <strong id="points">0</strong></p>
    <div id="result">🍋 🍒 ⭐</div>
    <button onclick="spin()">SPIN</button>
    <p id="msg"></p>
    <button onclick="logout()" style="background:#fff;">Излез</button>
  </div>

  <script>
    const SUPABASE_URL = "https://xjcvntplrbjsaozkduqd.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_EmZ_3ANedid8beyhVypb9Q_cGj5RMnq";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentPlayer = null;

    async function login() {
      const name = document.getElementById("playerName").value.trim();
      const pin = document.getElementById("playerPin").value.trim();
      const loginMsg = document.getElementById("loginMsg");

      if (!name || !pin) {
        loginMsg.textContent = "Въведи име и PIN.";
        return;
      }

      const { data, error } = await supabaseClient
        .from("players")
        .select("*")
        .eq("Name", name)
        .eq("Pin", pin)
        .limit(1);

      if (error) {
        loginMsg.textContent = "Грешка при връзка с базата.";
        console.error(error);
        return;
      }

      if (!data || data.length === 0) {
        loginMsg.textContent = "Грешно име или PIN.";
        return;
      }

      currentPlayer = data[0];
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("gameBox").classList.remove("hidden");
      document.getElementById("welcome").textContent = "Здрасти, " + currentPlayer.Name;
      document.getElementById("points").textContent = currentPlayer.Points ?? 0;
      document.getElementById("loginMsg").textContent = "";
    }

    async function spin() {
      if (!currentPlayer) return;

      let points = Number(currentPlayer.Points || 0);
      if (points < 10) {
        document.getElementById("msg").textContent = "Нямаш достатъчно точки.";
        return;
      }

      points -= 10;

      const symbols = ["🍋","🍒","⭐","🍇","7️⃣","🫒"];
      const a = symbols[Math.floor(Math.random() * symbols.length)];
      const b = symbols[Math.floor(Math.random() * symbols.length)];
      const c = symbols[Math.floor(Math.random() * symbols.length)];

      document.getElementById("result").textContent = `${a} ${b} ${c}`;

      let reward = 0;
      let message = "Опитай пак!";

      if (a === b && b === c) {
        reward = 100;
        message = "Голяма печалба! +100";
      } else if (a === b || b === c || a === c) {
        reward = 25;
        message = "Малка печалба! +25";
      }

      points += reward;

      const { error } = await supabaseClient
        .from("players")
        .update({ Points: points })
        .eq("id", currentPlayer.id);

      if (error) {
        document.getElementById("msg").textContent = "Грешка при запис.";
        console.error(error);
        return;
      }

      currentPlayer.Points = points;
      document.getElementById("points").textContent = points;
      document.getElementById("msg").textContent = message;
    }

    function logout() {
      currentPlayer = null;
      document.getElementById("playerName").value = "";
      document.getElementById("playerPin").value = "";
      document.getElementById("loginBox").classList.remove("hidden");
      document.getElementById("gameBox").classList.add("hidden");
      document.getElementById("msg").textContent = "";
    }
  </script>
</body>
</html>
