<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mykonos Casino Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:320px;
  padding:20px;
  background:#111;
  border:2px solid gold;
  border-radius:12px;
  text-align:center;
}

input,button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:0;
}

button{
  background:gold;
  font-weight:bold;
}

.balance{
  font-size:22px;
  color:#39ff14;
}
</style>
</head>

<body>

<div class="box">

<h2>MYKONOS LOGIN</h2>

<input id="name" placeholder="Име">
<input id="pin" placeholder="PIN" type="password">

<button onclick="login()">LOGIN</button>

<div id="status"></div>

<div id="userBox" style="display:none">
  <h3 id="userName"></h3>
  <div class="balance">€ <span id="balance">0</span></div>

  <button onclick="save()">SAVE BALANCE</button>
  <button onclick="goGame()">PLAY</button>
</div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://xjcvntplrbjsaozkduqd.supabase.co",
  "sb_publishable_EmZ_3ANedid8beyhVypb9Q_cGj5RMnq"
);

let currentUser = null;

async function login(){
  const name = document.getElementById("name").value;
  const pin = document.getElementById("pin").value;

  const { data, error } = await supabase
    .from("players")
    .select("*")
    .eq("name", name)
    .eq("pin", pin)
    .single();

  if(error || !data){
    document.getElementById("status").innerText = "❌ Грешен login";
    return;
  }

  currentUser = data;

  document.getElementById("userBox").style.display = "block";
  document.getElementById("userName").innerText = data.name;
  document.getElementById("balance").innerText = data.balance;

  document.getElementById("status").innerText = "✅ Успешен login";
}

async function save(){
  let newBalance = parseFloat(document.getElementById("balance").innerText);

  await supabase
    .from("players")
    .update({ balance: newBalance })
    .eq("id", currentUser.id);

  alert("Запазено!");
}

function goGame(){
  localStorage.setItem("balance", document.getElementById("balance").innerText);
  localStorage.setItem("player_id", currentUser.id);

  window.location.href = "mykonos-hot-5.html";
}
</script>

</body>
</html>
