<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>Mykonos Casino</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family:sans-serif;text-align:center;background:#0b3d91;color:white;padding:20px;">

<h2>Mykonos Casino</h2>

<div id="loginBox">
  <input id="name" placeholder="Име"><br><br>
  <input id="pin" placeholder="PIN"><br><br>
  <button onclick="login()">Вход</button>
  <p id="loginMsg"></p>
</div>

<div id="game" style="display:none;">
  <h3 id="welcome"></h3>
  <p>Coins: <span id="points"></span></p>
  <p>Mystery Pot: <span id="jackpot"></span></p>
  <p>Free Spins: <span id="free"></span></p>

  <select id="bet">
    <option>10</option>
    <option>20</option>
    <option>50</option>
    <option>100</option>
  </select><br><br>

  <div id="reels" style="font-size:40px;">🍋 🍒 ⭐ 🍇 🫒</div><br>

  <button onclick="spin()">SPIN</button>
  <p id="msg"></p>

  <div id="winBox" style="display:none;">
    <p>Win: <span id="win"></span></p>
    <button onclick="collect()">Collect</button>
    <button onclick="showDouble()">Double</button>
  </div>

  <div id="doubleBox" style="display:none;">
    <button onclick="double('red')">RED</button>
    <button onclick="double('black')">BLACK</button>
  </div>
</div>

<script>
const url = "https://xjcvntplrbjsaozkduqd.supabase.co";
const key = "sb_publishable_EmZ_3ANedid8beyhVypb9Q_cGj5RMnq";

const db = supabase.createClient(url, key);

let player=null, win=0, free=0, jackpot=0, doubles=0;

async function loadJackpot(){
  let {data}=await db.from("game_state").select("*").limit(1);
  jackpot=data[0].jackpot||0;
  document.getElementById("jackpot").innerText=jackpot;
}

async function login(){
  let name=document.getElementById("name").value;
  let pin=document.getElementById("pin").value;

  let {data}=await db.from("players").select("*").eq("Name",name).eq("Pin",pin);

  if(!data||data.length==0){
    document.getElementById("loginMsg").innerText="Грешен вход";
    return;
  }

  player=data[0];
  document.getElementById("loginBox").style.display="none";
  document.getElementById("game").style.display="block";
  document.getElementById("welcome").innerText="Здрасти "+player.Name;

  loadJackpot();
  update();
}

function update(){
  document.getElementById("points").innerText=player.Points;
  document.getElementById("free").innerText=free;
}

async function spin(){
  let bet=Number(document.getElementById("bet").value);

  if(free>0){
    free--;
  } else {
    if(player.Points<bet){ alert("нямаш coins"); return;}
    player.Points-=bet;
  }

  jackpot+=1;
  await db.from("game_state").update({jackpot:jackpot}).neq("id",0);

  let symbols=["🍋","🍒","⭐","🍇","🫒","💎"];
  let reels=[];
  for(let i=0;i<5;i++){
    reels.push(symbols[Math.floor(Math.random()*symbols.length)]);
  }

  document.getElementById("reels").innerText=reels.join(" ");

  let count={};
  reels.forEach(s=>count[s]=(count[s]||0)+1);

  win=0;

  for(let s in count){
    if(count[s]>=3) win=bet*count[s];
  }

  if(Math.random()<0.02){
    win+=jackpot;
    jackpot=0;
    await db.from("game_state").update({jackpot:0}).neq("id",0);
  }

  await db.from("players").update({Points:player.Points}).eq("id",player.id);

  if(win>0){
    document.getElementById("win").innerText=win;
    document.getElementById("winBox").style.display="block";
  }

  update();
}

async function collect(){
  player.Points+=win;
  await db.from("players").update({Points:player.Points}).eq("id",player.id);
  win=0;
  document.getElementById("winBox").style.display="none";
  document.getElementById("doubleBox").style.display="none";
  update();
}

function showDouble(){
  document.getElementById("doubleBox").style.display="block";
}

function double(choice){
  let r=Math.random()<0.5?"red":"black";

  if(choice==r){
    win*=2;
    document.getElementById("win").innerText=win;
  } else {
    win=0;
    document.getElementById("winBox").style.display="none";
    document.getElementById("doubleBox").style.display="none";
  }
}
</script>

</body>
</html>
