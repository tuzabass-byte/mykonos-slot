<!DOCTYPE html>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,sans-serif;
color:#fff;
background:
radial-gradient(circle at top,#1b65b8,#071433 36%,#02040c 78%);
overflow-x:hidden;
}

body:before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 15%,rgba(0,255,255,.22),transparent 25%),

}

.app{
max-width:430px;
margin:auto;
padding:14px 12px 105px;
position:relative;
z-index:1;
}

.hidden{
display:none!important;
}

.logo{
text-align:center;
font-size:32px;
font-weight:900;
color:#ffe66b;
text-shadow:0 0 12px #ff2a00,0 0 26px #ffd000,0 0 42px #00eaff;
margin:12px 0 10px;
}

.card{
background:rgba(0,0,0,.62);
border:2px solid rgba(255,215,70,.95);
border-radius:20px;
padding:14px;
margin:12px 0;
box-shadow:0 0 18px rgba(255,215,70,.45);
}

input,select,button{
width:100%;
padding:14px;
margin:7px 0;
border:0;
border-radius:14px;
font-size:16px;
}

button{
background:linear-gradient(135deg,#fff06b,#ffb000,#ff4b00);
color:#111;
font-weight:900;
cursor:pointer;
}

button:active{
transform:scale(.97);
}

.status{
text-align:center;
color:#ffe66b;
font-weight:900;
min-height:24px;
}

.hero{
position:relative;
overflow:hidden;
background:linear-gradient(120deg,#ffd500,#ff5c00 58%,#ff0066);
color:#111;
border-radius:24px;
padding:18px;
box-shadow:0 0 26px rgba(255,122,24,.9);
}

.hero h2{
margin:0;
font-size:22px;
}

.hero .bal{
font-size:28px;
font-weight:900;
margin-top:9px;
}

.ticker{
background:#02040c;
border:1px solid #00eaff;
color:#77ffff;
border-radius:14px;
padding:9px;
overflow:hidden;
white-space:nowrap;
font-weight:900;
margin:10px 0;
}

.ticker span{
display:inline-block;
padding-left:100%;
animation:ticker 14s linear infinite;
}

@keyframes ticker{
from{transform:translateX(0)}
to{transform:translateX(-100%)}
}

.quickGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.banner{
border-radius:18px;
padding:13px;
font-weight:900;
min-height:86px;
display:flex;
flex-direction:column;
justify-content:center;
}

.bonusBanner{
background:linear-gradient(135deg,#1bffd7,#0066ff);
}

.winnerBanner{
background:linear-gradient(135deg,#ff42df,#6200ff);
}

.jackpotBanner{
background:linear-gradient(135deg,#fff261,#ff7900,#ff1f00);
color:#111;
animation:pulse 1.4s infinite alternate;
}

.missionBanner{
background:linear-gradient(135deg,#20ff62,#007425);
color:#061606;
}

@keyframes pulse{
from{filter:brightness(1)}
to{filter:brightness(1.25);box-shadow:0 0 24px #ffd447}
}

.sectionTitle{
font-size:21px;
font-weight:900;
margin:6px 0 10px;
}

.games{
display:grid;
gap:13px;
}

.gameCard{
min-height:124px;
border-radius:20px;
padding:15px;
border:2px solid #ffd447;
display:flex;
flex-direction:column;
justify-content:space-between;
box-shadow:0 0 20px rgba(255,212,71,.35);
cursor:pointer;
}

.gameTitle{
font-size:25px;
font-weight:900;
text-shadow:0 0 10px #000;
}

.gameSub{
font-size:13px;
color:#eee;
}

.playBtn{
width:115px;
padding:9px;
border-radius:999px;
background:#ffd447;
color:#111;
text-align:center;
font-weight:900;
}

.vasa{
background:linear-gradient(135deg,#003a88,#00112e);
}

.didi{
background:linear-gradient(135deg,#461100,#c40000);
}

.mitko{
background:linear-gradient(135deg,#5b2100,#ff7a00);
}.leaderRow,.feedRow{
display:flex;
justify-content:space-between;
gap:8px;
padding:7px 0;
border-bottom:1px solid rgba(255,255,255,.12);
font-size:14px;
}

.chat{
height:130px;
overflow:auto;
border:1px solid rgba(255,255,255,.25);
background:rgba(0,0,0,.55);
padding:8px;
border-radius:14px;
}

.msg{
font-size:13px;
margin:4px 0;
}

.name{
color:#ffd447;
font-weight:900;
}

.inputRow{
display:flex;
gap:7px;
margin-top:8px;
}

.inputRow input{
flex:1;
margin:0;
}

.inputRow button{
width:92px;
margin:0;
}

.logoutBtn{
background:#d91414;
color:#fff;
}

.toast{
position:fixed;
left:50%;
top:16px;
transform:translateX(-50%) translateY(-90px);
max-width:390px;
width:calc(100% - 30px);
background:#050505;
border:2px solid #ffd447;
border-radius:18px;
padding:12px;
z-index:30;
text-align:center;
font-weight:900;
box-shadow:0 0 25px #ffd447;
transition:.35s;
}

.toast.show{
transform:translateX(-50%) translateY(0);
}
</style>
</head>

<div class="app">

</div><script>

const URL="https://xjcvntplrbjsaozkduqd.supabase.co/rest/v1/";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqY3ZudHBscmJqc2FvemtkdXFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTAzNzgsImV4cCI6MjA5MjM2NjM3OH0.R3-y_nHTDpXc0MCESafhS8XE-MtgE4-4V42ac7Z7gdo";

let user=null;

// load players
loadPlayers();

async function loadPlayers(){
let r=await fetch(URL+"players",{headers:{apikey:KEY}});
let d=await r.json();

playerSelect.innerHTML="";
d.forEach(p=>{
let o=document.createElement("option");
o.value=p.Name;
o.textContent=p.Name;
playerSelect.appendChild(o);
});
}

// LOGIN
async function login(){

let r=await fetch(URL+"players?Name=eq."+playerSelect.value,{headers:{apikey:KEY}});
let d=await r.json();

if(!d[0] || String(d[0].Pin)!=pinInput.value){
loginStatus.innerText="Грешен PIN";
return;
}

user=d[0];

loginBox.classList.add("hidden");
lobbyBox.classList.remove("hidden");

welcomeText.innerText="Здравей, "+user.Name;
balanceText.innerText=user.Points+"€";

myLink.innerText=location.href+"?ref="+user.ref_code;

sendSystem(user.Name+" влезе 💎");

loadChat();
setInterval(loadChat,2000);
loadTop();
}

// REGISTER 🔥
async function register(){

let name=regName.value;
let pin=regPin.value;
let ref=regRef.value;

if(!name || !pin){
regStatus.innerText="Попълни име и PIN";
return;
}

// генерираме код
let code=name.toUpperCase()+Math.floor(Math.random()*1000);

// създаваме играч
await fetch(URL+"players",{
method:"POST",
headers:{apikey:KEY,"Content-Type":"application/json"},
body:JSON.stringify({
Name:name,
Pin:pin,
Points:10,
ref_code:code,
ref_by:ref || null
})
});

// ако има referral → даваме бонус
if(ref){

let r=await fetch(URL+"players?ref_code=eq."+ref,{headers:{apikey:KEY}});
let d=await r.json();

if(d[0]){
let newPoints = (d[0].Points||0)+5;

await fetch(URL+"players?ref_code=eq."+ref,{
method:"PATCH",
headers:{apikey:KEY,"Content-Type":"application/json"},
body:JSON.stringify({Points:newPoints})
});

sendSystem(d[0].Name+" получи +5€ за покана 🎁");
}
}

regStatus.innerText="Регистрация успешна!";
loadPlayers();
}

// BONUS
function dailyBonus(){
user.Points+=5;
balanceText.innerText=user.Points+"€";
sendSystem(user.Name+" взе бонус +5€");
}

// CHAT
async function sendMsg(){
if(!msgInput.value)return;

await fetch(URL+"chat_messages",{
method:"POST",
headers:{apikey:KEY,"Content-Type":"application/json"},
body:JSON.stringify({
player_name:user.Name,
message:msgInput.value
})
});

msgInput.value="";
}

// SYSTEM MESSAGE
async function sendSystem(t){
await fetch(URL+"chat_messages",{
method:"POST",
headers:{apikey:KEY,"Content-Type":"application/json"},
body:JSON.stringify({
player_name:"SYSTEM",
message:t
})
});
}

// LOAD CHAT
async function loadChat(){
let r=await fetch(URL+"chat_messages?order=created_at.desc&limit=20",{headers:{apikey:KEY}});
let d=await r.json();

chat.innerHTML="";
d.reverse().forEach(x=>{
chat.innerHTML+=`<div class="msg"><span class="name">${x.player_name}:</span> ${x.message}</div>`;
});
}

// TOP PLAYER
async function loadTop(){
let r=await fetch(URL+"players?order=Points.desc&limit=1",{headers:{apikey:KEY}});
let d=await r.json();
topWinner.innerText=d[0].Name+" "+d[0].Points+"€";
}

// GAME CLICK
function openGame(g){
sendSystem(user.Name+" играе "+g);
alert("Следващата стъпка: реални игри");
}

// LOGOUT
function logout(){
location.reload();
}

</script>
