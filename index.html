<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vasa Fortune Stable Preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #0cf 0%, #023b7a 32%, #020b24 100%);
      color: white;
      overflow: hidden;
    }
    .game {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 10px;
    }
    .top {
      width: min(980px, 96vw);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .jackpot {
      border: 3px solid #ffd34d;
      border-radius: 16px;
      background: linear-gradient(#3b0000, #9b0000, #280000);
      box-shadow: 0 0 18px rgba(255, 215, 0, .8), inset 0 0 16px rgba(255,255,255,.18);
      padding: 10px;
      text-align: center;
      font-weight: 900;
    }
    .jackpot .name { font-size: 20px; letter-spacing: 1px; color: #ffe680; }
    .jackpot .value { font-size: 28px; color: #fff; text-shadow: 0 0 8px #ff0; }

    .title {
      font-size: clamp(34px, 6vw, 72px);
      font-weight: 1000;
      letter-spacing: 3px;
      text-shadow: 0 0 12px #00eaff, 0 5px 0 #071a4d, 0 0 34px #fff;
      margin: 4px 0;
    }
    .freebar {
      width: min(880px, 94vw);
      border: 3px solid #ffe680;
      border-radius: 999px;
      background: linear-gradient(90deg, #00164d, #0088ff, #00164d);
      box-shadow: 0 0 16px #00d9ff;
      padding: 8px 16px;
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      color: #fff7b2;
    }
    .slot-wrap {
      position: relative;
      width: min(900px, 96vw);
      padding: 16px;
      border: 8px solid #ff1515;
      border-radius: 34px;
      background: linear-gradient(#8b0000, #e00000, #5a0000);
      box-shadow: 0 0 30px rgba(255,0,0,.9), inset 0 0 22px rgba(255,255,255,.3);
    }
    .reels {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 10px;
      background: #120014;
      padding: 12px;
      border-radius: 22px;
      box-shadow: inset 0 0 25px #000;
    }
    .cell {
      min-height: clamp(74px, 12vh, 118px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(38px, 7vw, 72px);
      border-radius: 18px;
      background: radial-gradient(circle at 30% 20%, #fff, #ffd36b 18%, #b64800 55%, #3b0202 100%);
