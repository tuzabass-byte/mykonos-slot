<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mykonos Casino</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:radial-gradient(circle at top,#1b65b8,#071433 36%,#02040c 78%);
text-align:center;
}
.card{
border:2px solid gold;
margin:10px;
padding:10px;
border-radius:10px;
}
input,select,button{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}
button{
background:gold;
font-weight:bold;
}
.chat{
height:120px;
overflow:auto;
background:black;
margin:10px;
padding:5px;
}
</style>
</head>

<body>

<h1>🎰 MYKONOS CASINO</h1>

<div id="loginBox" class="card">

<h3>Вход</h3>
<select id="playerSelect"></select>
<input id="pinInput" placeholder="PIN">
<button onclick="login()">ВЛЕЗ</button>

<h3>Регистрация</h3>
<input id="regName" placeholder="Име">
<input id="regPin" placeholder="PIN">
<input id="regRef" placeholder="Referral код">
<button onclick="register()">РЕГИСТРАЦИЯ</button>

</div>

<div id="lobby" style="display:none">

<h2 id="welcome"></h2>
<h3>Баланс: <span id="bal"></span></h3>

<div class="card">
🔗 Твоят линк:
<div id="link"></div>
</div>

<div class="card">
<button onclick="bonus()">🎁 БОНУС +5€</button>
</div>

<div class="card">
💬 ЧАТ
<div id="chat" class="chat"></div>
<input id="msg">
<button onclick="send()">SEND</button>
</div>

</div>

<script>

const URL="https://xjcvntplrbjsaozkduqd.supabase.co/rest/v1/";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqY3ZudHBscmJqc2FvemtkdXFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTAzNzgsImV4cCI6MjA5MjM2NjM3OH0.R3-y_nHTDpXc0MCESafhS8XE-MtgE4-4V42ac7Z7gdo";

let user=null;

// generate clean ref code
function makeRefCode(name){
return name.replace(/\s+/g,'').toUpperCase()+Math.floor(100+Math.random()*900);
}

// invite link
function getLink(){
return location.origin + location.pathname + "?ref=" + user.ref_code;
}

// load players
loadPlayers();

async function loadPlayers(){
let r=await fetch(URL+"players",{headers:{apikey:KEY}});
let d=await r.json();

playerSelect.innerHTML="";
d.forEach(p=>{
let o=document.createElement("option");
o.value=p.Name;
o.textContent=p.Name;
playerSelect.appendChild(o);
});
}

// LOGIN
async function login(){

let r=await fetch(URL+"players?Name=eq."+playerSelect.value,{headers:{apikey:KEY}});
let d=await r.json();

if(!d[0] || d[0].Pin!=pinInput.value){
alert("Грешен PIN");return;
}

user=d[0];

// auto ref code
if(!user.ref_code){
user.ref_code=makeRefCode(user.Name);

await fetch(URL+"players?Name=eq."+user.Name,{
method:"PATCH",
headers:{apikey:KEY,"Content-Type":"application/json"},
body:JSON.stringify({ref_code:user.ref_code})
});
}

loginBox.style.display="none";
lobby.style.display="block";

welcome.innerText="Здравей "+user.Name;
bal.innerText=user.Points+"€";
link.innerText=getLink();

sendSystem(user.Name+" влезе");

loadChat();
setInterval(loadChat,2000);
}

// REGISTER
async function register(){

let name=regName.value;
let pin=regPin.value;
let ref=regRef.value;

if(!name || !pin){
alert("Попълни всичко");return;
}

let code=makeRefCode(name);

await fetch(URL+"players",{
method:"POST",
headers:{apikey:KEY,"Content-Type":"application/json"},
body:JSON.stringify({
Name:name,
Pin:pin,
Points:10,
ref_code:code,
ref_by:ref || null
})
});

// referral bonus
if(ref){

let r=await fetch(URL+"players?ref_code=eq."+ref,{headers:{apikey:KEY}});
let d=await r.json();

if(d[0]){
await fetch(URL+"players?ref_code=eq."+ref,{
method:"PATCH",
headers:{apikey:KEY,"Content-Type":"application/json"},
body:JSON.stringify({Points:d[0].Points+5})
});
}
}

alert("Регистрация успешна!");
loadPlayers();
}

// bonus
function bonus(){
user.Points+=5;
bal.innerText=user.Points+"€";
sendSystem(user.Name+" взе бонус +5€");
}

// chat
async function send(){
if(!msg.value)return;

await fetch(URL+"chat_messages",{
method:"POST",
headers:{apikey:KEY,"Content-Type":"application/json"},
body:JSON.stringify({
player_name:user.Name,
message:msg.value
})
});

msg.value="";
}

// system msg
async function sendSystem(t){
await fetch(URL+"chat_messages",{
method:"POST",
headers:{apikey:KEY,"Content-Type":"application/json"},
body:JSON.stringify({
player_name:"SYSTEM",
message:t
})
});
}

// load chat
async function loadChat(){
let r=await fetch(URL+"chat_messages?order=created_at.desc&limit=20",{headers:{apikey:KEY}});
let d=await r.json();

chat.innerHTML="";
d.reverse().forEach(x=>{
chat.innerHTML+=`<div><b>${x.player_name}:</b> ${x.message}</div>`;
});
}

</script>

</body>
</html>
