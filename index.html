<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mykonos Casino</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:
linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.9)),
url("https://images.unsplash.com/photo-1596838132731-3301c3fd4317");
background-size:cover;
}

/* layout */
.app{max-width:420px;margin:auto;padding:10px}
.hidden{display:none}

/* header */
.logo{
text-align:center;
font-size:28px;
font-weight:900;
color:#ffcc00;
text-shadow:0 0 10px red;
}

/* card */
.card{
background:rgba(0,0,0,.7);
border:2px solid #ffcc00;
border-radius:15px;
padding:10px;
margin:10px 0;
}

/* hero */
.hero{
background:linear-gradient(45deg,#ffcc00,#ff6600);
color:black;
border-radius:15px;
padding:15px;
text-align:center;
font-weight:900;
}

/* banners */
.banner{
padding:10px;
border-radius:10px;
margin:5px 0;
font-weight:900;
}

.bonus{background:#00ffc3;color:black}
.jackpot{background:#ff3b00}
.top{background:#8a2be2}

/* games */
.games{display:flex;gap:5px}
.game{
flex:1;
background:#111;
border:2px solid #ffcc00;
border-radius:10px;
padding:15px;
text-align:center;
}

/* chat */
.chat{
height:150px;
overflow:auto;
background:black;
padding:5px;
margin:10px 0;
}

.msg{font-size:13px}
.name{color:#ffcc00;font-weight:900}

.row{display:flex;gap:5px}
input{flex:1;padding:10px;border-radius:10px;border:none}
button{
padding:10px;
border:none;
border-radius:10px;
background:#ffcc00;
font-weight:900;
}
</style>
</head>

<body>

<div class="app">

<div class="logo">🎰 MYKONOS CASINO</div>

<!-- LOGIN -->
<div id="loginBox" class="card">
<select id="name"></select>
<input id="pin" placeholder="PIN">
<button onclick="login()">ВЛЕЗ</button>
</div>

<!-- LOBBY -->
<div id="lobby" class="hidden">

<div class="hero">
<div id="welcome"></div>
Баланс: <span id="bal"></span>
</div>

<div class="banner bonus" onclick="bonus()">🎁 ДНЕВЕН БОНУС</div>
<div class="banner jackpot">💰 JACKPOT: 12 500€</div>
<div class="banner top" id="top"></div>

<div class="card">
🎮 ИГРИ
<div class="games">
<div class="game" onclick="play('VASA')">VASA</div>
<div class="game" onclick="play('DIDI')">DIDI</div>
<div class="game" onclick="play('MITKO')">MITKO</div>
</div>
</div>

<div class="card">
💬 ЧАТ
<div id="chat" class="chat"></div>

<div class="row">
<input id="msg">
<button onclick="send()">SEND</button>
</div>
</div>

</div>

</div>

<script>

const URL="https://xjcvntplrbjsaozkduqd.supabase.co/rest/v1/";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqY3ZudHBscmJqc2FvemtkdXFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTAzNzgsImV4cCI6MjA5MjM2NjM3OH0.R3-y_nHTDpXc0MCESafhS8XE-MtgE4-4V42ac7Z7gdo";

let user=null;

// load players
fetch(URL+"players",{headers:{apikey:KEY}})
.then(r=>r.json())
.then(d=>{
d.forEach(p=>{
let o=document.createElement("option");
o.value=p.Name;
o.textContent=p.Name;
name.appendChild(o);
});
});

async function login(){

let r=await fetch(URL+"players?Name=eq."+name.value,{headers:{apikey:KEY}});
let d=await r.json();

if(!d[0]||String(d[0].Pin)!==pin.value){
alert("Грешен PIN");return;
}

user=d[0];

loginBox.classList.add("hidden");
lobby.classList.remove("hidden");

welcome.innerText="Здравей, "+user.Name;
bal.innerText=user.Points+"€";

sendSystem(user.Name+" влезе 🎰");

loadChat();
setInterval(loadChat,2000);
loadTop();
}

async function send(){
if(!msg.value)return;

await fetch(URL+"chat_messages",{
method:"POST",
headers:{apikey:KEY,"Content-Type":"application/json"},
body:JSON.stringify({
player_name:user.Name,
message:msg.value
})
});

msg.value="";
}

async function sendSystem(t){
await fetch(URL+"chat_messages",{
method:"POST",
headers:{apikey:KEY,"Content-Type":"application/json"},
body:JSON.stringify({
player_name:"SYSTEM",
message:t
})
});
}

async function loadChat(){
let r=await fetch(URL+"chat_messages?order=created_at.desc&limit=20",{headers:{apikey:KEY}});
let d=await r.json();

chat.innerHTML="";
d.reverse().forEach(x=>{
chat.innerHTML+=`<div class="msg"><span class="name">${x.player_name}:</span> ${x.message}</div>`;
});
}

function bonus(){
user.Points+=5;
bal.innerText=user.Points+"€";
sendSystem(user.Name+" взе бонус +5€");
}

function play(g){
sendSystem(user.Name+" играе "+g);
alert(g+" идва следващо");
}

async function loadTop(){
let r=await fetch(URL+"players?order=Points.desc&limit=1",{headers:{apikey:KEY}});
let d=await r.json();
top.innerText="🏆 Топ: "+d[0].Name+" "+d[0].Points+"€";
}

</script>

</body>
</html>
