<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mykonos Hot</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, #1f5f1f 0%, #0f2b0f 35%, #120606 75%, #0a0a0a 100%);
      color: #fff;
      padding: 10px;
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
    }

    .hidden { display: none; }

    .panel {
      background: rgba(8, 8, 8, 0.94);
      border: 2px solid #b78b18;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
      box-shadow: 0 8px 22px rgba(0,0,0,.35);
    }

    h1, p { margin: 8px 0; }

    input, select, button {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 16px;
      margin: 6px 0;
    }

    button {
      background: linear-gradient(180deg, #ffe278, #d9a400);
      color: #111;
      font-weight: 700;
    }

    .secondary {
      background: #fff;
      color: #111;
    }

    .logo {
      text-align: center;
      font-size: 30px;
      font-weight: 800;
      color: #f7d35a;
      text-shadow: 0 2px 0 #000, 0 0 16px rgba(80,255,80,.25);
      margin-bottom: 8px;
    }

    .jackpots {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .jp {
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
      border: 2px solid rgba(255,255,255,.14);
      background: linear-gradient(180deg, #0d1f4e, #09142f);
    }

    .jp .name {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .5px;
    }

    .jp .value {
      margin-top: 4px;
      font-size: 24px;
      font-weight: 800;
      color: #ffd652;
    }

    .jp.mini .value { color: #88ff77; }
    .jp.minor .value { color: #ddd; }
    .jp.major .value { color: #ffb24c; }
    .jp.mega .value { color: #ff6666; }

    .machine {
      background:
        linear-gradient(180deg, rgba(61,17,8,.98), rgba(20,20,20,.98)),
        linear-gradient(180deg, #274f16, #132710);
      border: 4px solid #c99925;
      border-radius: 18px;
      padding: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,.45), inset 0 0 25px rgba(255,180,50,.08);
    }

    .machine-title {
      text-align: center;
      font-size: 28px;
      font-weight: 900;
      color: #ffd859;
      margin-bottom: 10px;
      text-shadow: 0 2px 0 #000, 0 0 10px rgba(255,200,80,.25);
    }

    .slot-grid {
      display: grid;
      grid-template-columns: 42px 1fr 42px;
      gap: 6px;
      align-items: stretch;
    }

    .side {
      background: linear-gradient(180deg, #2b8d35, #14531b);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      align-items: center;
      color: white;
      font-weight: 700;
      min-height: 282px;
      font-size: 13px;
      border: 2px solid rgba(255,255,255,.12);
    }

    .reels {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      min-height: 282px;
    }

    .reel {
      display: grid;
      grid-template-rows: repeat(3, 1fr);
      gap: 6px;
    }

    .cell {
      min-height: 90px;
      border-radius: 12px;
      border: 3px solid #d3a048;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.08), transparent 30%),
        linear-gradient(180deg, #4b1e0f, #0f0f0f);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 800;
      color: white;
      box-shadow: inset 0 0 15px rgba(255,255,255,.05);
      transition: transform .12s ease, box-shadow .12s ease;
      overflow: hidden;
    }

    .cell.win {
      box-shadow: 0 0 14px gold, inset 0 0 12px rgba(255,255,255,.16);
      transform: scale(1.04);
    }

    .bottom {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .boxinfo {
      background: #080808;
      border-radius: 10px;
      padding: 8px;
      text-align: center;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,.08);
    }

    .boxinfo b {
      display: block;
      margin-top: 4px;
      font-size: 21px;
      color: #ffd756;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .message {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      background: linear-gradient(180deg, #881f1f, #c92c2c);
      text-align: center;
      font-weight: 800;
      font-size: 18px;
    }

    .bonus {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      background: linear-gradient(180deg, #156d2a, #0e4219);
      text-align: center;
      font-weight: 800;
      font-size: 18px;
    }

    .loginBox {
      max-width: 420px;
      margin: 40px auto 0;
    }

    @media (max-width: 520px) {
      .machine-title { font-size: 24px; }
      .cell {
        min-height: 72px;
        font-size: 27px;
      }
      .side {
        min-height: 228px;
        font-size: 12px;
      }
      .bottom {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div id="loginBox" class="panel loginBox">
      <div class="logo">🔥 Mykonos Hot 🔥</div>
      <input id="name" placeholder="Име">
      <input id="pin" placeholder="PIN" type="password">
      <button id="loginBtn" type="button">Влез</button>
      <p id="loginMsg"></p>
    </div>

    <div id="gameBox" class="hidden">
      <div class="jackpots">
        <div class="jp mini">
          <div class="name">MINI</div>
          <div class="value" id="miniPot">50</div>
        </div>
        <div class="jp minor">
          <div class="name">MINOR</div>
          <div class="value" id="minorPot">150</div>
        </div>
        <div class="jp major">
          <div class="name">MAJOR</div>
          <div class="value" id="majorPot">500</div>
        </div>
        <div class="jp mega">
          <div class="name">MEGA</div>
          <div class="value" id="megaPot">2000</div>
        </div>
      </div>

      <div class="machine">
        <div class="machine-title">🔥 BURNING HOT 🔥</div>

        <div class="slot-grid">
          <div class="side">
            <div>5</
