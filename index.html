<div class="slot-wrap" id="mainWrap">
  <div class="title">🔥 BURNING HOT 🔥</div>

  <div class="slot-grid">
    <div class="lines-side">
      <div>5</div><div>4</div><div>3</div><div>2</div><div>1</div>
    </div>

    <div class="reels" id="reels"></div>

    <div class="lines-side">
      <div>1</div><div>2</div><div>3</div><div>4</div><div>5</div>
    </div>
  </div>

  <div class="control-bar">
    <div class="info-box">COINS<br><strong id="coins">0</strong></div>
    <div>
      <select id="bet" onchange="syncSelectors()">
        <option value="10">Bet 10</option>
        <option value="20">Bet 20</option>
        <option value="50">Bet 50</option>
        <option value="100">Bet 100</option>
      </select>
    </div>
    <div>
      <select id="lines" onchange="syncSelectors()">
        <option value="5">Lines 5</option>
        <option value="10">Lines 10</option>
        <option value="20">Lines 20</option>
      </select>
    </div>
    <div class="info-box">FREE<br><strong id="freeSpins">0</strong></div>
    <div>
      <button class="spin-btn" type="button" onclick="spinMain()">SPIN</button>
    </div>
  </div>

  <div id="gameMsg" class="message hidden"></div>
</div>

<div class="slot-wrap hidden" id="bonusWrap">
  <div class="bonusTitle">🎁 FREE SPINS BONUS 🎁</div>

  <div class="slot-grid">
    <div class="lines-side">
      <div>5</div><div>4</div><div>3</div><div>2</div><div>1</div>
    </div>

    <div class="reels" id="bonusReels"></div>

    <div class="lines-side">
      <div>1</div><div>2</div><div>3</div><div>4</div><div>5</div>
    </div>
  </div>

  <div class="control-bar">
    <div class="info-box">COINS<br><strong id="bonusCoins">0</strong></div>
    <div class="info-box">BET<br><strong id="bonusBetLabel">10</strong></div>
    <div class="info-box">LINES<br><strong id="bonusLinesLabel">5</strong></div>
    <div class="info-box">LEFT<br><strong id="bonusLeft">0</strong></div>
    <div>
      <button class="spin-btn" type="button" onclick="spinBonus()">FREE SPIN</button>
    </div>
  </div>

  <div id="bonusMsg" class="message hidden"></div>
</div>
