<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mykonos Hot 5x4</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, #2e7d32 0%, #0d2b12 35%, #060606 80%);
      color: #fff;
      padding: 8px;
    }
    .app {
      max-width: 430px;
      margin: 0 auto;
    }
    .jackpots {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 8px;
    }
    .jp {
      border-radius: 10px;
      padding: 8px 6px;
      text-align: center;
      border: 2px solid rgba(255,255,255,.18);
      box-shadow: inset 0 0 10px rgba(255,255,255,.05);
    }
    .jp .label {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .5px;
    }
    .jp .val {
      margin-top: 4px;
      font-size: 22px;
      font-weight: 900;
    }
    .grand { background: linear-gradient(180deg, #711515, #310909); }
    .major { background: linear-gradient(180deg, #184818, #0a210a); }
    .minor { background: linear-gradient(180deg, #123a70, #081829); }
    .mini  { background: linear-gradient(180deg, #4c1567, #1a0722); }

    .grand .val { color: #fff; }
    .major .val { color: #fff; }
    .minor .val { color: #fff; }
    .mini .val  { color: #fff; }

    .logo {
      text-align: center;
      font-size: 30px;
      font-weight: 900;
      color: #f1d35a;
      text-shadow: 0 2px 0 #000, 0 0 10px rgba(255,215,90,.3);
      margin: 8px 0 10px;
    }

    .machine {
      background: linear-gradient(180deg, #143911, #0b140b);
      border: 3px solid #d8c255;
      border-radius: 14px;
      padding: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,.35);
    }

    .reels {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      margin-bottom: 10px;
    }

    .reel {
      display: grid;
      grid-template-rows: repeat(4, 1fr);
      gap: 5px;
    }

    .cell {
      min-height: 76px;
      border: 2px solid #d5c14b;
      border-radius: 6px;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,.08), transparent 30%),
        linear-gradient(180deg, #0f3d16, #062109);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 800;
      box-shadow: inset 0 0 8px rgba(255,255,255,.05);
      transition: transform .12s ease, box-shadow .12s ease;
    }

    .cell.win {
      box-shadow: 0 0 14px gold, inset 0 0 12px rgba(255,255,255,.18);
      transform: scale(1.03);
    }

    .midbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .panel {
      background: #050505;
      border-radius: 10px;
      padding: 10px 6px;
      text-align: center;
    }

    .panel .small {
      font-size: 12px;
      font-weight: 700;
      opacity: .95;
    }

    .panel .big {
      font-size: 24px;
      font-weight: 900;
      color: #fff;
      margin-top: 2px;
    }

    .bets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }

    .betBtn {
      background: linear-gradient(180deg, #2c2c2c, #141414);
      border: 2px solid #666;
      color: #fff;
      border-radius: 10px;
      padding: 8px 4px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
    }

    .betBtn.active {
      background: linear-gradient(180deg, #6f8f2a, #365313);
      border-color: #b8de58;
      color: #fff46d;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1.4fr 1fr;
      gap: 8px;
      align-items: center;
    }

    .smallBtn, .spinBtn {
      border: none;
      border-radius: 999px;
      font-weight: 900;
      cursor: pointer;
    }

    .smallBtn {
      min-height: 82px;
      background: #0e0e0e;
      color: #fff;
      border: 2px solid rgba(255,255,255,.15);
      font-size: 14px;
    }

    .spinBtn {
      min-height: 120px;
      background: radial-gradient(circle, #2d2d2d 0%, #111 65%);
      border: 3px solid rgba(255,255,255,.18);
      color: #fff;
      font-size: 44px;
      line-height: 1;
    }

    .bottomBar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .bottomBtn {
      background: #0a0a0a;
      border: 2px solid rgba(255,255,255,.12);
      color: #fff;
      border-radius: 10px;
      min-height: 52px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .msg {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      background: linear-gradient(180deg, #143b12, #0b240a);
      font-weight: 800;
      text-align: center;
      min-height: 44px;
    }

    @media (max-width: 400px) {
      .cell { min-height: 66px; font-size: 26px; }
      .spinBtn { min-height: 106px; font-size: 38px; }
      .bets { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">

    <div class="jackpots">
      <div class="jp grand">
        <div class="label">GRAND</div>
        <div class="val" id="grandVal">25807</div>
      </div>
      <div class="jp major">
        <div class="label">MAJOR</div>
        <div class="val" id="majorVal">4388</div>
      </div>
      <div class="jp minor">
        <div class="label">MINOR</div>
        <div class="val" id="minorVal">50</div>
      </div>
      <div class="jp mini">
        <div class="label">MINI</div>
        <div class="val" id="miniVal">10</div>
      </div>
    </div>

    <div class="logo">BURNING HOT 5x4</div>

    <div class="machine">
      <div class="reels" id="reels"></div>

      <div class="midbar">
        <div class="panel">
          <div class="small">БАЛАНС</div>
          <div class="big" id="balance">1000</div>
        </div>
        <div class="panel">
          <div class="small">ПОСЛЕДНА ПЕЧАЛБА</div>
          <div class="big" id="lastWin">0</div>
        </div>
      </div>

      <div class="bets">
        <button class="betBtn active" data-bet="10">10</button>
        <button class="betBtn" data-bet="20">20</button>
        <button class="betBtn" data-bet="50">50</button>
        <button class="betBtn" data-bet="100">100</button>
      </div>

      <div class="controls">
        <button class="smallBtn" id="autoBtn">⟲<br>AUTO</button>
        <button class="spinBtn" id="spinBtn">↻</button>
        <button class="smallBtn" id="soundBtn">🔊<br>SOUND</button>
      </div>

      <div class="bottomBar">
        <button class="bottomBtn" id="betInfoBtn">ЗАЛОГ: <span id="betView">10</span></button>
        <button class="bottomBtn" id="freeInfoBtn">FREE: <span id="freeView">0</span></button>
      </div>

      <div class="msg" id="msg">Готово за игра</div>
    </div>
  </div>

  <script>
    const BASE_SYMBOLS = ["🍒","🍋","🍇","🍉","🔔","7️⃣"];
    const WILD = "🔥";
    const SCATTER = "⚡";

    const PAY = {
      "🍒": {3: 10, 4: 20, 5: 40},
      "🍋": {3: 10, 4: 20, 5: 40},
      "🍇": {3: 15, 4: 30, 5: 60},
      "🍉": {3: 20, 4: 40, 5: 80},
      "🔔": {3: 30, 4: 60, 5: 120},
      "7️⃣": {3: 60, 4: 120, 5: 240}
    };

    let balance = 1000;
    let lastWin = 0;
    let freeSpins = 0;
    let currentBet = 10;
    let spinning = false;
    let autoSpin = false;
    let soundOn = true;
    let audioCtx = null;

    let jackpots = {
      grand: 25807,
      major: 4388,
      minor: 50,
      mini: 10
    };

    const byId = id => document.getElementById(id);

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function beep(freq, duration, type = "square", volume = 0.03) {
      if (!soundOn) return;
      if (!audioCtx) initAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = volume;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      setTimeout(() => osc.stop(), duration);
    }

    function spinSound() {
      beep(180, 70);
      setTimeout(() => beep(230, 70), 90);
      setTimeout(() => beep(290, 90), 180);
    }

    function winSound() {
      beep(560, 100, "triangle", 0.05);
      setTimeout(() => beep(760, 120, "triangle", 0.05), 130);
      setTimeout(() => beep(980, 160, "triangle", 0.05), 280);
    }

    function freeSound() {
      beep(740, 100, "triangle", 0.05);
      setTimeout(() => beep(960, 150, "triangle", 0.05), 150);
    }

    function jackpotSound() {
      beep(350, 120, "sawtooth", 0.05);
      setTimeout(() => beep(520, 140, "sawtooth", 0.05), 140);
      setTimeout(() => beep(760, 180, "sawtooth", 0.05), 300);
      setTimeout(() => beep(1020, 220, "sawtooth", 0.05), 520);
    }

    function setMsg(text) {
      byId("msg").textContent = text;
    }

    function updateHud() {
      byId("balance").textContent = balance;
      byId("lastWin").textContent = lastWin;
      byId("betView").textContent = currentBet;
      byId("freeView").textContent = freeSpins;
      byId("grandVal").textContent = jackpots.grand;
      byId("majorVal").textContent = jackpots.major;
      byId("minorVal").textContent = jackpots.minor;
      byId("miniVal").textContent = jackpots.mini;
    }

    function randomSymbol() {
      const r = Math.random();
      if (r < 0.03) return SCATTER;
      if (r < 0.09) return WILD;
      return BASE_SYMBOLS[Math.floor(Math.random() * BASE_SYMBOLS.length)];
    }

    function blankMatrix() {
      return Array.from({ length: 4 }, () => Array(5).fill(""));
    }

    function randomMatrix() {
      const m = blankMatrix();
      for (let row = 0; row < 4; row++) {
        for (let col = 0; col < 5; col++) {
          m[row][col] = randomSymbol();
        }
      }
      return m;
    }

    function draw(matrix, highlights = []) {
      const reels = byId("reels");
      reels.innerHTML = "";

      for (let col = 0; col < 5; col++) {
        const reel = document.createElement("div");
        reel.className = "reel";

        for (let row = 0; row < 4; row++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          cell.textContent = matrix[row][col];

          if (highlights.some(([r, c]) => r === row && c === col)) {
            cell.classList.add("win");
          }

          reel.appendChild(cell);
        }

        reels.appendChild(reel);
      }
    }

    function paylines() {
      return [
        [[0,0],[0,1],[0,2],[0,3],[0,4]],
        [[1,0],[1,1],[1,2],[1,3],[1,4]],
        [[2,0],[2,1],[2,2],[2,3],[2,4]],
        [[3,0],[3,1],[3,2],[3,3],[3,4]],
        [[0,0],[1,1],[2,2],[1,3],[0,4]]
      ];
    }

    function countScatter(matrix) {
      let count = 0;
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 5; c++) {
          if (matrix[r][c] === SCATTER) count++;
        }
      }
      return count;
    }

    function payoutFor(symbol, count) {
      if (!PAY[symbol] || !PAY[symbol][count]) return 0;
      return PAY[symbol][count] * (currentBet / 10);
    }

    function evaluate(matrix) {
      let total = 0;
      let highlights = [];

      for (const line of paylines()) {
        const [r0, c0] = line[0];
        let base = matrix[r0][c0];
        if (base === SCATTER) continue;

        let count = 1;
        const local = [[r0, c0]];

        for (let i = 1; i < line.length; i++) {
          const [r, c] = line[i];
          const cur = matrix[r][c];

          if (cur === base || cur === WILD || base === WILD) {
            if (base === WILD && cur !== WILD) base = cur;
            count++;
            local.push([r, c]);
          } else {
            break;
          }
        }

        if (base !== WILD && count >= 3) {
          total += payoutFor(base, count);
          highlights = highlights.concat(local);
        }
      }

      return { total, highlights };
    }

    async function spin() {
      if (spinning) return;
      spinning = true;

      spinSound();

      if (freeSpins > 0) {
        freeSpins--;
      } else {
        if (balance < currentBet) {
          setMsg("Недостатъчен баланс");
          spinning = false;
          return;
        }
        balance -= currentBet;
        jackpots.grand += 2;
        jackpots.major += 1;
        jackpots.minor += 1;
        jackpots.mini += 1;
      }

      updateHud();

      const finalMatrix = randomMatrix();
      const temp = blankMatrix();

      for (let col = 0; col < 5; col++) {
        for (let loop = 0; loop < 8; loop++) {
          for (let row = 0; row < 4; row++) {
            temp[row][col] = randomSymbol();
          }
          draw(temp.map(r => [...r]));
          await new Promise(res => setTimeout(res, 70));
        }

        for (let row = 0; row < 4; row++) {
          temp[row][col] = finalMatrix[row][col];
        }

        draw(temp.map(r => [...r]));
        await new Promise(res => setTimeout(res, 95));
      }

      const scatters = countScatter(finalMatrix);
      const evalRes = evaluate(finalMatrix);

      let win = evalRes.total;
      let text = "Нищо";

      if (scatters === 3) {
        freeSpins += 8;
        freeSound();
        text = "⚡ FREE SPINS +8";
      } else if (scatters === 4) {
        freeSpins += 12;
        freeSound();
        text = "⚡ FREE SPINS +12";
      } else if (scatters >= 5) {
        freeSpins += 20;
        freeSound();
        text = "⚡ FREE SPINS +20";
      }

      const chance = Math.random();
      let jpText = "";

      if (jackpots.mini >= 20 && chance < 0.002) {
        win += jackpots.mini;
        jackpots.mini = 10;
        jpText = " MINI!";
        jackpotSound();
      } else if (jackpots.minor >= 80 && chance < 0.0008) {
        win += jackpots.minor;
        jackpots.minor = 50;
        jpText = " MINOR!";
        jackpotSound();
      } else if (jackpots.major >= 600 && chance < 0.00025) {
        win += jackpots.major;
        jackpots.major = 500;
        jpText = " MAJOR!";
        jackpotSound();
      } else if (jackpots.grand >= 26000 && chance < 0.00005) {
        win += jackpots.grand;
        jackpots.grand = 25807;
        jpText = " GRAND!";
        jackpotSound();
      }

      if (win > 0) {
        balance += win;
        winSound();
        text = "Печалба " + win + jpText;
      }

      lastWin = win;
      draw(finalMatrix, evalRes.highlights);
      updateHud();

      if (freeSpins > 0 && text.startsWith("Печалба")) {
        setMsg(text + " | Free left: " + freeSpins);
      } else if (freeSpins > 0 && text.includes("FREE SPINS")) {
        setMsg(text + " | Left: " + freeSpins);
      } else {
        setMsg(text);
      }

      spinning = false;

      if (autoSpin) {
        setTimeout(() => spin(), 500);
      }
    }

    document.querySelectorAll(".betBtn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".betBtn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentBet = Number(btn.dataset.bet);
        updateHud();
      });
    });

    byId("spinBtn").addEventListener("click", () => {
      initAudio();
      spin();
    });

    byId("autoBtn").addEventListener("click", () => {
      autoSpin = !autoSpin;
      byId("autoBtn").style.borderColor = autoSpin ? "#78ff76" : "rgba(255,255,255,.15)";
      byId("autoBtn").style.color = autoSpin ? "#78ff76" : "#fff";
      if (autoSpin && !spinning) spin();
    });

    byId("soundBtn").addEventListener("click", () => {
      soundOn = !soundOn;
      byId("soundBtn").innerHTML = soundOn ? "🔊<br>SOUND" : "🔇<br>SOUND";
    });

    draw(randomMatrix());
    updateHud();
  </script>
</body>
</html>
