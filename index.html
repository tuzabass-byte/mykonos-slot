<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vasa Fortune FINAL</title>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at top,#15558f,#061943 40%,#020817);
color:#fff;
}

.app{max-width:420px;margin:auto;padding:15px}

.logo{
text-align:center;
font-size:26px;
font-weight:900;
color:#36f3ff;
text-shadow:0 0 15px #00eaff;
}

.jackpot{
display:flex;
justify-content:space-between;
padding:8px;
margin:5px 0;
border:2px solid #36f3ff;
border-radius:10px;
}

.machine{
border:3px solid gold;
border-radius:12px;
overflow:hidden;
background:#200020;
}

.title{
background:red;
text-align:center;
font-weight:900;
padding:8px;
}

.reels{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:2px;
padding:5px;
}

.reel{
display:grid;
grid-template-rows:repeat(3,70px);
gap:2px;
}

.cell{
display:flex;
align-items:center;
justify-content:center;
border:1px solid gold;
font-size:28px;
background:#300020;
}

.win{background:gold;color:black}
.scatter{background:orange;color:black}

.stats{
display:flex;
justify-content:space-around;
padding:10px;
background:#080611;
}

.controls{text-align:center;margin-top:10px}

.spinBtn{
width:90px;height:90px;
border-radius:50%;
background:red;
border:4px solid white;
font-weight:900;
color:white;
}

.freeBox{
display:none;
background:gold;
color:black;
text-align:center;
font-weight:900;
padding:8px;
margin:5px 0;
border-radius:10px;
}
</style>
</head>

<body>

<div class="app">

<div class="logo">VASA FORTUNE</div>

<div class="jackpot"><span>Mega</span><span>12928€</span></div>
<div class="jackpot"><span>Maxi</span><span>647€</span></div>
<div class="jackpot"><span>Mini</span><span>42€</span></div>

<div class="freeBox" id="freeBox"></div>

<div class="machine">
<div class="title">🔥 VASA FORTUNE 🔥</div>

<div class="reels" id="reels"></div>

<div class="stats">
<div>WIN<br><b id="win">0€</b></div>
<div>BET<br><b>0.50€</b></div>
<div>BAL<br><b id="bal">20€</b></div>
</div>
</div>

<div style="text-align:center;margin-top:5px" id="status">READY</div>

<div class="controls">
<button class="spinBtn" onclick="spin()">SPIN</button>
</div>

</div>

<script>

function beep(f){
let c=new (window.AudioContext||window.webkitAudioContext)();
let o=c.createOscillator();
let g=c.createGain();
o.connect(g);g.connect(c.destination);
o.frequency.value=f;
o.start();
g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+0.2);
}

let balance=20;
let bet=0.5;

let free=false;
let freeSpins=0;
let freeWin=0;

const symbols=[
{id:"7",h:"7",w:5,p:{3:10,4:40,5:600}},
{id:"BAR",h:"BAR",w:8,p:{3:8,4:20,5:100}},
{id:"D",h:"💎",w:10,p:{3:8,4:20,5:100}},
{id:"B",h:"🔔",w:14,p:{3:4,4:10,5:40}},
{id:"C",h:"🍒",w:18,p:{3:2,4:6,5:20}},
{id:"H",h:"♞",w:12,p:{3:2,4:6,5:20}},
{id:"W",h:"W",w:3},
{id:"S",h:"SC",w:3}
];

function r(){
let sum=symbols.reduce((a,b)=>a+b.w,0);
let x=Math.random()*sum;
for(let s of symbols){
x-=s.w;
if(x<=0)return s;
}
}

function draw(){
reels.innerHTML="";
for(let i=0;i<5;i++){
let reel=document.createElement("div");
reel.className="reel";

for(let j=0;j<3;j++){
let c=document.createElement("div");
c.className="cell";
let s=r();
c.innerHTML=s.h;
c.dataset.id=s.id;
if(s.id=="S")c.classList.add("scatter");
reel.appendChild(c);
}
reels.appendChild(reel);
}
}

function board(){
let b=[[],[],[]];
[...document.querySelectorAll(".reel")].forEach((r,c)=>{
[...r.children].forEach((x,i)=>b[i][c]=x);
});
return b;
}

function spin(){

if(!free && balance<bet){
status.innerText="NO MONEY";
return;
}

beep(200);

if(!free) balance-=bet;
else freeSpins--;

draw();

setTimeout(calc,200);
}

function calc(){

let b=board();
let total=0;
let sc=0;

b.flat().forEach(x=>{if(x.dataset.id=="S")sc++;});

if(sc>=3 && !free){
free=true;
freeSpins=30;
freeWin=0;
status.innerText="🎉 30 FREE SPINS";
beep(800);
return;
}

for(let r=0;r<3;r++){
let row=b[r];
let base=null;
let count=0;

for(let i=0;i<5;i++){
let id=row[i].dataset.id;

if(!base && id!="W" && id!="S") base=id;
if(id==base || id=="W") count++;
else break;
}

if(base && count>=3){
let s=symbols.find(x=>x.id==base);
let win=s.p[count];
total+=win;

for(let i=0;i<count;i++) row[i].classList.add("win");
}
}

if(free){
for(let c=0;c<5;c++){
let col=[b[0][c],b[1][c],b[2][c]];
if(col.some(x=>x.dataset.id=="W") && Math.random()<0.4){
col.forEach(x=>{
x.innerHTML="W";
x.dataset.id="W";
});
status.innerText="🔥 EXPANDING WILD!";
}
}
}

if(total>0){
beep(500);

if(free){
freeWin+=total;
status.innerText="FREE WIN "+total+"€";
}else{
balance+=total;
status.innerText="WIN "+total+"€";
}
}

if(free && freeSpins<=0){
free=false;
balance+=freeWin;
status.innerText="🎉 YOU WON "+freeWin+"€";
freeWin=0;
}

win.innerText=(free?freeWin:0)+"€";
bal.innerText=balance+"€";

freeBox.style.display=free?"block":"none";
freeBox.innerText="FREE "+(30-freeSpins)+"/30 · "+freeWin+"€";
}

draw();

</script>

</body>
</html>
