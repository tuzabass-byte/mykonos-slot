<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vasa Fortune Base</title>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at top,#15558f,#061943 40%,#020817);
color:#fff;
text-align:center;
}

.logo{
font-size:26px;
color:#36f3ff;
margin-top:10px;
}

.reels{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:4px;
margin:15px;
}

.cell{
height:60px;
display:flex;
align-items:center;
justify-content:center;
border:1px solid gold;
background:#200020;
font-size:28px;
}

button{
margin-top:10px;
font-size:18px;
padding:15px 25px;
border-radius:50%;
background:red;
color:white;
border:none;
}
</style>
</head>

<body>

<div class="logo">VASA FORTUNE</div>

<div id="reels" class="reels"></div>

<div>WIN: <span id="win">0</span></div>
<div>BET: <span id="bet">1</span></div>
<div>BAL: <span id="bal">20</span></div>

<button onclick="spin()">SPIN</button>

<script>

let balance=20;
let bet=1;

const symbols=["🍒","🔔","♞","💎","BAR","7"];

function rand(){
return symbols[Math.floor(Math.random()*symbols.length)];
}

function draw(board){
reels.innerHTML="";
board.forEach(s=>{
let d=document.createElement("div");
d.className="cell";
d.innerText=s;
reels.appendChild(d);
});
}

function spin(){

if(balance<bet)return;

balance-=bet;

let board=[];
for(let i=0;i<15;i++){
board.push(rand());
}

draw(board);

let winVal=0;

/* проста проверка */
if(board[0]===board[1] && board[1]===board[2]){
winVal=bet*2;
}

balance+=winVal;

win.innerText=winVal;
bal.innerText=balance;
}

draw(Array(15).fill("🍒"));

</script>

</body>
</html>
