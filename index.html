<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vasa Fortune Stable</title>
<style>
body{margin:0;font-family:Arial;background:#061943;color:#fff}
.app{max-width:420px;margin:auto;padding:10px}
.logo{text-align:center;font-size:26px;color:#36f3ff}
.reels{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin:10px 0}
.cell{height:60px;display:flex;align-items:center;justify-content:center;border:1px solid gold;font-size:28px;background:#200020}
.spinBtn{width:100px;height:100px;border-radius:50%;background:red;color:white;font-weight:bold}
</style>
</head>
<body>

<div class="app">
<div class="logo">VASA FORTUNE</div>

<div id="reels" class="reels"></div>

<div>WIN: <span id="win">0</span></div>
<div>BET: <span id="bet">1</span></div>
<div>BAL: <span id="bal">20</span></div>

<button onclick="spin()" class="spinBtn">SPIN</button>
</div>

<script>

let balance = 20;
let bet = 1;

const symbols = [
{id:"7",v:10},
{id:"BAR",v:8},
{id:"D",v:8},
{id:"B",v:6},
{id:"H",v:4},
{id:"C",v:2}
];

function randSymbol(){
let r = Math.random();

if(bet >= 1){
if(r < 0.70) return "C";
if(r < 0.85) return "B";
if(r < 0.95) return "H";
if(r < 0.985) return "D";
if(r < 0.995) return "BAR";
return "7";
}

return symbols[Math.floor(Math.random()*symbols.length)].id;
}

function draw(board){
reels.innerHTML="";
for(let i=0;i<15;i++){
let c=document.createElement("div");
c.className="cell";
c.innerText=board[i];
reels.appendChild(c);
}
}

function evaluate(board){
let win=0;

for(let row=0;row<3;row++){
let base = board[row];
let count=1;

for(let col=1;col<5;col++){
if(board[row+col*3]===base) count++;
else break;
}

if(count>=3){
if(count===5 && Math.random()<0.7){
count=3;
}

let s = symbols.find(x=>x.id===base);
win += bet * s.v;
}
}

return win;
}

function spin(){
if(balance < bet) return;

balance -= bet;

let board = [];
for(let i=0;i<15;i++){
board.push(randSymbol());
}

draw(board);

let w = evaluate(board);

/* сух контрол */
if(bet>=1){
w = Math.min(w, bet*2.5);
}

balance += w;

win.innerText = w.toFixed(2);
bal.innerText = balance.toFixed(2);
}

draw(Array(15).fill("C"));

</script>

</body>
</html>
