<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mitko Koch Bells</title>

<style>
body{margin:0;font-family:Arial;background:#1b0900;color:#fff;text-align:center}
.app{max-width:420px;margin:auto;padding:10px}
.reels{display:grid;grid-template-columns:repeat(5,1fr);gap:3px}
.cell{height:70px;border:1px solid gold;display:flex;align-items:center;justify-content:center;font-size:26px;background:#2a0a00}
.controls{margin-top:10px}
button{padding:10px 15px;margin:5px;font-weight:900}
</style>
</head>

<body>

<div class="app">

<h2>👨‍🍳 MITKO BELLS 🔔</h2>

<div>Баланс: <span id="bal">20</span>€</div>
<div>Залог: <span id="bet">1</span>€</div>

<div class="reels" id="reels"></div>

<div class="controls">
<button onclick="changeBet(-1)">-</button>
<button onclick="spin()">SPIN</button>
<button onclick="changeBet(1)">+</button>
</div>

<div id="status"></div>

</div>

<script>

let balance=20;
let bets=[0.5,1,2,5];
let bi=1;

let inBonus=false;
let respins=0;
let total=0;

const baseSymbols=["🍲","🔪","🥩","🧂","🔥"];

function update(){
bal.innerText=balance.toFixed(2);
bet.innerText=bets[bi];
}

function changeBet(d){
bi=Math.max(0,Math.min(bets.length-1,bi+d));
update();
}

function randBell(){
let v=[0.2,0.5,1,2,3,5];
return v[Math.floor(Math.random()*v.length)];
}

function makeBoard(){
let b=[];
for(let i=0;i<15;i++){
if(Math.random()<0.2){
b.push({t:"B",v:randBell()});
}else{
b.push({t:"S",v:0});
}
}
return b;
}

function draw(b){
reels.innerHTML="";
b.forEach(x=>{
let d=document.createElement("div");
d.className="cell";

if(x.t==="B"){
d.innerHTML="🔔<br>"+x.v+"€";
}else{
d.innerHTML=baseSymbols[Math.floor(Math.random()*baseSymbols.length)];
}

reels.appendChild(d);
});
}

function countBells(b){
return b.filter(x=>x.t==="B").length;
}

function collect(b){
let got=0;
b.forEach(x=>{
if(x.t==="B"){
total+=x.v;
got++;
}
});
return got;
}

function spin(){

if(!inBonus && balance<bets[bi]){
status.innerText="Няма баланс";
return;
}

let b=makeBoard();
draw(b);

if(inBonus){

respins--;

let g=collect(b);

if(g>0){
respins=3;
status.innerText="🔔 +"+g+" камбани!";
}else{
status.innerText="няма камбани...";
}

if(respins<=0){
inBonus=false;
balance+=total;
status.innerText="💰 общо: "+total+"€";
total=0;
}

update();
return;
}

balance-=bets[bi];

let bells=countBells(b);

if(bells>=5){
inBonus=true;
respins=3;
total=0;

collect(b);

status.innerText="🔥 BONUS!";
update();
return;
}

status.innerText="spin...";
update();
}

update();
draw(makeBoard());

</script>

</body>
</html>
