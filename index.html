<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friends Bet Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #132c5c, #050915);
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      width: 340px;
      background: rgba(0, 0, 0, 0.65);
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 0 25px #00aaff;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      color: #00d9ff;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 14px;
      border: none;
      border-radius: 10px;
      background: #e00022;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #ff0033;
    }

    #msg {
      margin-top: 15px;
      color: #ff7070;
      min-height: 22px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Friends Bet</h1>

    <input id="name" type="text" placeholder="Name" />
    <input id="pin" type="password" placeholder="Pin" />

    <button onclick="login()">LOGIN</button>

    <div id="msg"></div>
  </div>

  <script>
    const SUPABASE_URL = "ТВОЯ_SUPABASE_URL";
    const SUPABASE_ANON_KEY = "ТВОЯ_SUPABASE_ANON_KEY";

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function login() {
      const name = document.getElementById("name").value.trim();
      const pin = document.getElementById("pin").value.trim();
      const msg = document.getElementById("msg");

      msg.textContent = "";

      if (!name || !pin) {
        msg.textContent = "Въведи Name и Pin.";
        return;
      }

      const { data, error } = await sb
        .from("players")
        .select("id, Name, Pin, balance, ref_code, ref_by")
        .eq("Name", name)
        .eq("Pin", pin)
        .single();

      if (error || !data) {
        msg.textContent = "Грешно име или PIN.";
        return;
      }

      sessionStorage.setItem("player_id", data.id);
      sessionStorage.setItem("player_name", data.Name);

      window.location.href = "lucky-fruits.html";
    }
  </script>
</body>
</html>
