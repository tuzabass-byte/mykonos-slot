<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vasa Fortune TOP</title>
<style>
body{margin:0;font-family:Arial;background:radial-gradient(circle,#00cfff,#001a4d,#000);color:#fff;text-align:center}
.slot{max-width:420px;margin:auto;padding:10px}
.reels{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;background:#900;padding:10px;border-radius:15px;border:3px solid gold}
.cell{height:70px;background:#fff;color:#000;font-size:30px;display:flex;align-items:center;justify-content:center;border-radius:10px}
.win{background:gold}
button{padding:12px;font-weight:bold;border-radius:10px;border:none;margin:5px}
.spin{background:red;color:#fff;font-size:20px}
</style>
</head>
<body>
<div class="slot">
<h2>VASA FORTUNE TOP</h2>
<div id="reels" class="reels"></div>
<p>Balance: <span id="bal">1000</span></p>
<p>Win: <span id="win">0</span></p>
<button class="spin" onclick="spin()">SPIN</button>
</div>
<script>
const symbols=['🍒','🍋','🍊','🍇','🔔','⭐','💎','7️⃣','🧿'];
let balance=1000,win=0,free=0;
const reels=document.getElementById('reels');
function rand(){return symbols[Math.floor(Math.random()*symbols.length)]}
function draw(b){reels.innerHTML='';b.forEach(s=>{let d=document.createElement('div');d.className='cell';d.textContent=s;reels.appendChild(d)})}
function weights(){return{lose:75,small:15,big:7,bonus:3}}
function outcome(){let w=weights(),r=Math.random()*100;if(r<w.bonus)return'bonus';if(r<w.bonus+w.big)return'big';if(r<w.bonus+w.big+w.small)return'small';return'lose'}
function loseBoard(){let b=Array.from({length:15},rand);return b}
function winBoard(type){let b=loseBoard();let line=[0,1,2,3,4];let sym=type==='big'?'💎':'⭐';line.forEach(i=>b[i]=sym);return b}
function bonusBoard(){let b=loseBoard();[0,3,7,10,14].forEach(i=>b[i]='🧿');return b}
function spin(){if(balance<=0&&free<=0)return alert('No balance');win=0;if(free>0){free--}else{balance--}
let out=outcome();let b;
if(out==='bonus'){b=bonusBoard();free+=30}
else if(out==='big'){b=winBoard('big');win=balance*0.5}
else if(out==='small'){b=winBoard('small');win=5}
else b=loseBoard();
balance+=win;
draw(b);
document.getElementById('bal').textContent=balance;
document.getElementById('win').textContent=win;
}
draw(loseBoard());
</script>
</body>
</html>
