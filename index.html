<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mykonos Casino</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
text-align:center;
}
.box{
max-width:420px;
margin:auto;
padding:20px;
}
input,button{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}
button{
background:#ffcc00;
font-weight:900;
}
.chat{
height:200px;
overflow:auto;
border:1px solid #555;
margin:10px 0;
padding:5px;
text-align:left;
}
.msg{
font-size:13px;
margin:3px 0;
}
.name{
color:#ffcc00;
font-weight:900;
}
</style>
</head>

<body>

<div class="box">

<h2>🎰 MYKONOS CASINO</h2>

<div id="loginBox">
<select id="name">
<option>Mariana</option>
<option>Marian</option>
<option>Yanko</option>
<option>Stoianka</option>
<option>Mitko</option>
<option>Vasilka</option>
</select>

<br>

<input id="pin" placeholder="PIN">

<br>

<button onclick="login()">ВЛЕЗ</button>
</div>

<div id="game" style="display:none">

<h3 id="welcome"></h3>

<div>Баланс: <span id="bal">0</span>€</div>

<hr>

<h3>💬 ЧАТ</h3>

<div class="chat" id="chat"></div>

<input id="msg" placeholder="напиши...">
<button onclick="sendMsg()">SEND</button>

</div>

</div>

<script>

const URL="https://xjcvntplrbjsaozkduqd.supabase.co/rest/v1/";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqY3ZudHBscmJqc2FvemtkdXFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTAzNzgsImV4cCI6MjA5MjM2NjM3OH0.R3-y_nHTDpXc0MCESafhS8XE-MtgE4-4V42ac7Z7gdo";

let user=null;

async function login(){

let name=document.getElementById("name").value;
let pin=document.getElementById("pin").value;

let r=await fetch(URL+"players?Name=eq."+name,{
headers:{apikey:KEY}
});

let data=await r.json();

if(!data[0] || String(data[0].Pin)!==pin){
alert("Грешен PIN");
return;
}

user=data[0];

document.getElementById("loginBox").style.display="none";
document.getElementById("game").style.display="block";

document.getElementById("welcome").innerText="Здравей, "+user.Name;
document.getElementById("bal").innerText=user.Points;

sendSystem(user.Name+" влезе в казиното 🎰");

loadChat();
setInterval(loadChat,2000);
}

async function sendMsg(){

let text=document.getElementById("msg").value;
if(!text)return;

await fetch(URL+"chat_messages",{
method:"POST",
headers:{
apikey:KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
player_name:user.Name,
message:text
})
});

document.getElementById("msg").value="";
}

async function sendSystem(t){
await fetch(URL+"chat_messages",{
method:"POST",
headers:{
apikey:KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
player_name:"SYSTEM",
message:t
})
});
}

async function loadChat(){

let r=await fetch(URL+"chat_messages?order=created_at.desc&limit=20",{
headers:{apikey:KEY}
});

let data=await r.json();

let html="";

data.reverse().forEach(x=>{
html+=`<div class="msg"><span class="name">${x.player_name}:</span> ${x.message}</div>`;
});

document.getElementById("chat").innerHTML=html;
}

</script>

</body>
</html>
