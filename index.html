<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vasa Fortune Stable V2</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:radial-gradient(circle at top,#15558f,#061943 40%,#020817);color:#fff}
.app{max-width:430px;margin:auto;padding:12px 10px 92px}
.logo{text-align:center;font-size:27px;font-weight:900;color:#36f3ff}
.reels{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin:10px}
.cell{height:60px;border:1px solid gold;display:flex;align-items:center;justify-content:center;font-size:28px;background:#200020}
.spinBtn{width:90px;height:90px;border-radius:50%;background:red;color:white;font-weight:bold}
</style>
</head>
<body>

<div class="app">
<div class="logo">VASA FORTUNE V2</div>

<div id="reels" class="reels"></div>

<div>WIN: <span id="win">0</span></div>
<div>BET: <span id="bet">1</span></div>
<div>BAL: <span id="bal">20</span></div>

<button onclick="spin()" class="spinBtn">SPIN</button>
</div>

<script>

let balance=20;
let bet=1;
let spinCounter=0;

function rand(){
let r=Math.random();

// по-живо начало
if(balance<40){
if(r<0.55)return "🍒";
if(r<0.75)return "🔔";
if(r<0.9)return "♞";
if(r<0.97)return "💎";
return "7";
}

// сухо след 80
if(balance>=80){
if(r<0.85)return "🍒";
if(r<0.95)return "🔔";
return "♞";
}

return ["🍒","🔔","♞","💎","7"][Math.floor(Math.random()*5)];
}

function draw(b){
reels.innerHTML="";
b.forEach(s=>{
let d=document.createElement("div");
d.className="cell";
d.innerText=s;
reels.appendChild(d);
});
}

function spin(){

if(balance<bet)return;

balance-=bet;
spinCounter++;

let b=[];
for(let i=0;i<15;i++) b.push(rand());

draw(b);

let winVal=0;

// малко по-добра печалба логика
if(b[0]===b[1] && b[1]===b[2]){
winVal=bet*2;
}

if(Math.random()<0.15) winVal+=bet*3;

balance+=winVal;

// jackpot събития
if(spinCounter===40){
balance+=5;
alert("🎉 MINI JACKPOT +5€");
}

if(spinCounter===70){
balance+=10;
alert("🎉 MAXI JACKPOT +10€");
}

if(spinCounter===100){
balance+=20;
alert("🎉 MEGA JACKPOT +20€");
}

win.innerText=winVal.toFixed(2);
bal.innerText=balance.toFixed(2);
}

draw(Array(15).fill("🍒"));

</script>
</body>
</html>
