<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vasa Fortune V16</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#061943;color:#fff}
.app{max-width:420px;margin:auto;padding:10px 8px 90px}

.logo{text-align:center;font-size:24px;font-weight:900;color:#36f3ff}

.jackpot{
height:36px;
border:2px solid #36f1ff;
border-radius:10px;
margin:4px 0;
display:flex;
justify-content:space-between;
padding:0 10px;
align-items:center;
font-size:16px;
}

.freeBox{
display:none;
background:#ffe15a;
color:#111;
text-align:center;
font-weight:900;
padding:6px;
border-radius:8px;
margin:5px 0;
}

.machine{border:2px solid gold;border-radius:10px;background:#21001b}
.title{text-align:center;background:red;padding:6px;font-weight:900}

.reels{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;padding:4px}
.reel{display:grid;grid-template-rows:repeat(3,60px);gap:2px}

.cell{
display:flex;
align-items:center;
justify-content:center;
border:1px solid gold;
font-size:26px;
background:#300020;
}

.win{background:gold;color:#000}
.scatter{background:orange;color:#000}

.stats{
display:flex;
justify-content:space-around;
padding:8px;
font-size:14px;
}

.controls{text-align:center;margin-top:8px}

.spinBtn{
width:80px;height:80px;border-radius:50%;
background:red;color:white;font-weight:900;
}

.popup{
display:none;position:fixed;inset:0;
background:rgba(0,0,0,.7);
align-items:center;justify-content:center;
}

.popupBox{
background:#081331;
border:2px solid #36f1ff;
padding:20px;
text-align:center;
border-radius:12px;
}
</style>
</head>

<body>

<div class="app">

<div class="logo">VASA FORTUNE</div>

<div class="jackpot"><span>Mega</span><span>12928€</span></div>
<div class="jackpot"><span>Maxi</span><span>647€</span></div>
<div class="jackpot"><span>Mini</span><span>42€</span></div>

<div class="freeBox" id="freeBox"></div>

<div class="machine">
<div class="title">🔥 VASA 🔥</div>
<div class="reels" id="reels"></div>

<div class="stats">
<div>WIN<br><b id="win">0€</b></div>
<div>BET<br><b id="bet">1€</b></div>
<div>BAL<br><b id="bal">20€</b></div>
</div>
</div>

<div id="status" style="text-align:center;margin-top:5px">READY</div>

<div class="controls">
<button class="spinBtn" onclick="spin()">SPIN</button>
</div>

</div>

<div class="popup" id="popup">
<div class="popupBox">
<h3 id="popTitle"></h3>
<p id="popText"></p>
<button onclick="popup.style.display='none'">OK</button>
</div>
</div>

<script>

let balance=20;
let bet=1;

let free=false;
let freeSpins=0;
let freeWin=0;

const SOFT_MAX=70;

/* symbols */
const symbols=[
{id:"7",h:"7",w:3,p:{3:10,4:40,5:100}},
{id:"BAR",h:"BAR",w:5,p:{3:8,4:20,5:60}},
{id:"D",h:"💎",w:6,p:{3:8,4:20,5:60}},
{id:"B",h:"🔔",w:10,p:{3:4,4:10,5:30}},
{id:"H",h:"♞",w:12,p:{3:3,4:8,5:20}},
{id:"C",h:"🍒",w:18,p:{3:2,4:6,5:15}},
{id:"W",h:"W",w:2},
{id:"S",h:"SC",w:2}
];

function r(){
let arr=[...symbols];

/* ако балансът падне → по-лесно бонус */
if(balance<=10){
arr.find(x=>x.id=="S").w=4;
}

/* ако е висок баланс → сухо */
if(balance>SOFT_MAX){
arr.find(x=>x.id=="7").w=0.5;
arr.find(x=>x.id=="BAR").w=1;
arr.find(x=>x.id=="D").w=1;
arr.find(x=>x.id=="W").w=0.3;
}

let sum=arr.reduce((a,b)=>a+b.w,0);
let x=Math.random()*sum;

for(let s of arr){
x-=s.w;
if(x<=0)return s;
}
}

function draw(){
reels.innerHTML="";
for(let i=0;i<5;i++){
let reel=document.createElement("div");
reel.className="reel";

for(let j=0;j<3;j++){
let c=document.createElement("div");
c.className="cell";
let s=r();
c.innerHTML=s.h;
c.dataset.id=s.id;
if(s.id=="S")c.classList.add("scatter");
reel.appendChild(c);
}

reels.appendChild(reel);
}
}

function spin(){

if(!free && balance<=0){
status.innerText="0€";
popup.style.display="flex";
popTitle.innerText="INFO";
popText.innerText="Моля свържете се със Stefan Boss 😄";
return;
}

if(!free) balance-=bet;
else freeSpins--;

draw();
setTimeout(calc,200);
}

function calc(){

let total=0;
let sc=0;
let cells=[...document.querySelectorAll(".cell")];

cells.forEach(x=>{if(x.dataset.id=="S")sc++});

/* free spins */
if(sc>=3 && !free){
free=true;
freeSpins=20;
freeWin=0;
popup.style.display="flex";
popTitle.innerText="🎉 FREE SPINS";
popText.innerText="Печелите 20 безплатни!";
return;
}

/* печалба */
for(let i=0;i<cells.length-2;i++){
let a=cells[i].dataset.id;
let b=cells[i+1].dataset.id;
let c=cells[i+2].dataset.id;

if(a==b && b==c){
let sym=symbols.find(x=>x.id==a);
if(sym && sym.p[3]){
total+=sym.p[3];
}
}
}

/* лимит */
if(free){
if(total>20) total=20;
freeWin+=total;
}else{
balance+=total;
}

/* край free */
if(free && freeSpins<=0){
free=false;
balance+=freeWin;

popup.style.display="flex";
popTitle.innerText="🎉 БРАВО!";
popText.innerText="Спечелихте "+freeWin+"€";

freeWin=0;
}

win.innerText=total+"€";
bal.innerText=balance+"€";

freeBox.style.display=free?"block":"none";
freeBox.innerText="FREE "+freeSpins+" · "+freeWin+"€";
}

draw();

</script>

</body>
</html>
