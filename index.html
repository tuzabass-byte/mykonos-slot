<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Friends Bet Casino</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b2a;
  color:white;
  text-align:center;
}

h1{margin-top:20px}

button{
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
  cursor:pointer;
}

input{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

#game{
  display:none;

  display:flex;

</head>

<body>

<h1>🎰 Friends Bet Casino</h1>

<div id="loginBox">
  <input id="name" placeholder="Име"><br>
  <input id="pin" placeholder="PIN"><br>
  <button onclick="login()">Вход</button>
</div>

<h2 id="user"></h2>
<h3 id="balance"></h3>

<button onclick="startGame()">ИГРАЙ</button>

<!-- GAME -->
<div id="game">
  <h1>🎰 SLOT</h1>

  <div class="reels">
    <div id="r1">🍒</div>
    <div id="r2">🍋</div>
    <div id="r3">🍇</div>
  </div>

  <button onclick="spin()">SPIN</button>
  <br><br>
  <button onclick="back()">⬅ Назад</button>
</div>

<script>
const sb = supabase.createClient(
"https://xjcvntplrbjsaozkduqd.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqY3ZudHBscmJqc2FvemtkdXFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTAzNzgsImV4cCI6MjA5MjM2NjM3OH0.R3-y_nHTDpXc0MCESafhS8XE-MtgE4-4V42ac7Z7gdo"
);

let player = null;

// LOGIN
async function login(){

  let name = document.getElementById("name").value;
  let pin = document.getElementById("pin").value;

  let {data} = await sb
    .from("players")
    .select("*")
    .eq("Name", name)
    .eq("Pin", pin)
    .single();

  if(!data){
    alert("грешно име или PIN");
    return;
  }

  player = data;
  localStorage.setItem("player", JSON.stringify(player));

  update();
}

// LOAD USER
function update(){

  if(!player){
    let p = localStorage.getItem("player");
    if(p) player = JSON.parse(p);
  }

  if(player){
    document.getElementById("user").innerText =
      "Добре дошъл " + player.Name;

    document.getElementById("balance").innerText =
      "Баланс: " + player.balance;
  }
}

// GAME
function startGame(){

  if(!player){
    alert("влез първо");
    return;
  }

  document.getElementById("game").style.display="block";
}

// SPIN
async function spin(){

  if(player.balance <= 0){
    alert("нямаш пари");
    return;
  }

  player.balance -= 1;

  let arr=["🍒","🍋","🍇","⭐","💎"];

  let a=arr[Math.random()*5|0];
  let b=arr[Math.random()*5|0];
  let c=arr[Math.random()*5|0];

  r1.innerText=a;
  r2.innerText=b;
  r3.innerText=c;

  let win=0;

  if(a==b && b==c){
    win=5;
    alert("печалба!");
  }

  player.balance += win;

  await sb
    .from("players")
    .update({balance: player.balance})
    .eq("id", player.id);

  localStorage.setItem("player", JSON.stringify(player));

  update();
}

// BACK
function back(){
  document.getElementById("game").style.display="none";
}

// INIT
update();
</script>

</body>
</html>
