<script>
async function login(){
  const name = document.getElementById("name").value.trim();
  const pin = document.getElementById("pin").value.trim();
  const msgEl = document.getElementById("msg");

  if(!name || !pin){
    msgEl.innerText = "Vuvedi ime i PIN";
    return;
  }

  let { data, error } = await db
    .from("players")
    .select("*")
    .eq("Name", name)
    .eq("Pin", pin)
    .limit(1);

  if(error){
    console.error(error);
    msgEl.innerText = "Greshka pri vruzkata";
    return;
  }

  if(!data || data.length === 0){
    msgEl.innerText = "Greshno ime ili PIN";
    return;
  }

  player = data[0];

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
  document.getElementById("welcome").innerText = "Zdrasti " + player.Name;
  document.getElementById("coins").innerText = player.Points ?? 0;
}
</script>
