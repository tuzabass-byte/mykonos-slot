<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friends Bet Casino</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top,#243bff,#050510);
  color:white;
}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:rgba(0,0,0,0.6);
}

.logo{
  font-size:24px;
  color:gold;
}

.balance{
  color:gold;
  font-weight:bold;
}

.container{
  padding:30px;
  text-align:center;
}

.game{
  margin-top:40px;
  padding:20px;
  background:#111;
  border-radius:20px;
  display:inline-block;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:gold;
  font-weight:bold;
  cursor:pointer;
}

.chat{
  margin-top:50px;
  max-width:600px;
  margin-left:auto;
  margin-right:auto;
}

.messages{
  height:150px;
  overflow:auto;
  background:#111;
  padding:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">🎰 Friends Bet</div>
  <div class="balance" id="balance">Balance: ...</div>
</div>

<div class="container">
  <h1>CASINO LOBBY</h1>

  <div class="game">
    <h2>Friends Slot</h2>
    <button onclick="openGame()">PLAY</button>
  </div>

  <div class="chat">
    <h3>💬 Chat</h3>
    <div class="messages" id="messages"></div>

    <input id="msgInput" placeholder="write message..." style="width:70%">
    <button onclick="sendMsg()">SEND</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://xjcvntplrbjsaozkduqd.supabase.co";
const SUPABASE_KEY = "sb_publishable_EmZ_3ANedid8beyhVypb9Q_cGj5RMnq";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const player = JSON.parse(localStorage.getItem("player"));

if(!player){
  alert("no login");
  window.location.href = "login.html";
}

// BALANCE LOAD
async function loadBalance(){
  const { data } = await supabase
    .from("players")
    .select("balance")
    .eq("name", player.name)
    .single();

  document.getElementById("balance").innerText =
    "Balance: " + data.balance;
}

loadBalance();

// OPEN GAME
function openGame(){
  window.location.href = "FRIENDS_BET_CASINO_v13_FIXED_PAYOUT.html";
}

// CHAT SEND
async function sendMsg(){
  const text = document.getElementById("msgInput").value;

  if(!text) return;

  await supabase.from("messages").insert({
    user: player.name,
    text: text
  });

  document.getElementById("msgInput").value="";
}

// CHAT LISTEN
supabase
  .channel('chat')
  .on('postgres_changes',
    { event: 'INSERT', schema: 'public', table: 'messages' },
    payload => {
      addMsg(payload.new);
    }
  )
  .subscribe();

// ADD MSG UI
function addMsg(msg){
  const div = document.createElement("div");
  div.innerHTML = "<b>"+msg.user+":</b> "+msg.text;
  document.getElementById("messages").appendChild(div);
}
</script>

</body>
</html>
