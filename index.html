<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mykonos Casino VIP</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,sans-serif;
color:#fff;
background:radial-gradient(circle at top,#1b65b8,#071433 36%,#02040c 78%);
overflow-x:hidden;
}

body:before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 15%,rgba(0,255,255,.22),transparent 25%),
radial-gradient(circle at 85% 20%,rgba(255,209,0,.20),transparent 24%),
radial-gradient(circle at 50% 95%,rgba(255,0,102,.16),transparent 34%);
pointer-events:none;
}

.app{
max-width:430px;
margin:auto;
padding:14px 12px 105px;
position:relative;
z-index:1;
}

.hidden{display:none!important}

.logo{
text-align:center;
font-size:32px;
font-weight:900;
color:#ffe66b;
text-shadow:0 0 12px #ff2a00,0 0 26px #ffd000,0 0 42px #00eaff;
margin:12px 0 10px;
}

.card{
background:rgba(0,0,0,.62);
border:2px solid rgba(255,215,70,.95);
border-radius:20px;
padding:14px;
margin:12px 0;
box-shadow:0 0 18px rgba(255,215,70,.45);
}

input,select,button{
width:100%;
padding:14px;
margin:7px 0;
border:0;
border-radius:14px;
font-size:16px;
}

button{
background:linear-gradient(135deg,#fff06b,#ffb000,#ff4b00);
color:#111;
font-weight:900;
cursor:pointer;
}

button:active{transform:scale(.97)}

.status{
text-align:center;
color:#ffe66b;
font-weight:900;
min-height:24px;
}

.hero{
position:relative;
overflow:hidden;
background:linear-gradient(120deg,#ffd500,#ff5c00 58%,#ff0066);
color:#111;
border-radius:24px;
padding:18px;
box-shadow:0 0 26px rgba(255,122,24,.9);
}

.hero h2{margin:0;font-size:22px}
.hero .bal{font-size:28px;font-weight:900;margin-top:9px}

.ticker{
background:#02040c;
border:1px solid #00eaff;
color:#77ffff;
border-radius:14px;
padding:9px;
overflow:hidden;
white-space:nowrap;
font-weight:900;
margin:10px 0;
}

.ticker span{
display:inline-block;
padding-left:100%;
animation:ticker 14s linear infinite;
}

@keyframes ticker{
from{transform:translateX(0)}
to{transform:translateX(-100%)}
}

.quickGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.banner{
border-radius:18px;
padding:13px;
font-weight:900;
min-height:86px;
display:flex;
flex-direction:column;
justify-content:center;
}

.bonusBanner{background:linear-gradient(135deg,#1bffd7,#0066ff)}
.winnerBanner{background:linear-gradient(135deg,#ff42df,#6200ff)}
.jackpotBanner{
background:linear-gradient(135deg,#fff261,#ff7900,#ff1f00);
color:#111;
animation:pulse 1.4s infinite alternate;
}
.missionBanner{background:linear-gradient(135deg,#20ff62,#007425);color:#061606}

@keyframes pulse{
from{filter:brightness(1)}
to{filter:brightness(1.25);box-shadow:0 0 24px #ffd447}
}

.sectionTitle{
font-size:21px;
font-weight:900;
margin:6px 0 10px;
}

.games{display:grid;gap:13px}

.gameCard{
min-height:124px;
border-radius:20px;
padding:15px;
border:2px solid #ffd447;
display:flex;
flex-direction:column;
justify-content:space-between;
box-shadow:0 0 20px rgba(255,212,71,.35);
cursor:pointer;
}

.gameTitle{
font-size:25px;
font-weight:900;
text-shadow:0 0 10px #000;
}

.gameSub{font-size:13px;color:#eee}

.playBtn{
width:115px;
padding:9px;
border-radius:999px;
background:#ffd447;
color:#111;
text-align:center;
font-weight:900;
}

.vasa{background:linear-gradient(135deg,#003a88,#00112e)}
.didi{background:linear-gradient(135deg,#461100,#c40000)}
.mitko{background:linear-gradient(135deg,#5b2100,#ff7a00)}

.leaderRow,.feedRow{
display:flex;
justify-content:space-between;
gap:8px;
padding:7px 0;
border-bottom:1px solid rgba(255,255,255,.12);
font-size:14px;
}

.chat{
height:135px;
overflow:auto;
border:1px solid rgba(255,255,255,.25);
background:rgba(0,0,0,.55);
padding:8px;
border-radius:14px;
}

.msg{font-size:13px;margin:4px 0}
.name{color:#ffd447;font-weight:900}

.inputRow{
display:flex;
gap:7px;
margin-top:8px;
}

.inputRow input{flex:1;margin:0}
.inputRow button{width:92px;margin:0}

.inviteBox{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.2);
border-radius:14px;
padding:10px;
font-size:13px;
word-break:break-all;
}

.logoutBtn{background:#d91414;color:#fff}

.toast{
position:fixed;
left:50%;
top:16px;
transform:translateX(-50%) translateY(-90px);
max-width:390px;
width:calc(100% - 30px);
background:#050505;
border:2px solid #ffd447;
border-radius:18px;
padding:12px;
z-index:30;
text-align:center;
font-weight:900;
box-shadow:0 0 25px #ffd447;
transition:.35s;
}

.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>

<body>

<div id="toast" class="toast"></div>

<div class="app">

<div class="logo">🎰 MYKONOS CASINO VIP</div>

<div id="loginBox" class="card">
<h2>🔐 VIP Вход</h2>

<select id="playerSelect">
<option value="">Зареждане...</option>
</select>

<input id="pinInput" type="password" placeholder="PIN код">
<button onclick="login()">ВЛЕЗ В КАЗИНОТО</button>
<div id="loginStatus" class="status"></div>

<h3>🆕 Регистрация</h3>
<input id="regName" placeholder="Име">
<input id="regPin" type="password" placeholder="PIN">
<input id="regRef" placeholder="Referral код / автоматично от линка">
<button onclick="register()">РЕГИСТРАЦИЯ</button>
<div id="regStatus" class="status"></div>
</div>

<div id="lobbyBox" class="hidden">

<div class="hero">
<small id="welcomeText">Добре дошъл</small>
<h2>VIP Lobby 💎</h2>
<div class="bal">Баланс: <span id="balanceText">0€</span></div>
</div>

<div class="ticker">
<span id="tickerText">🔥 Добре дошли във VIP казиното · 🎁 Дневен бонус · 💰 Jackpot расте...</span>
</div>

<div class="quickGrid">
<div class="banner bonusBanner" onclick="dailyBonus()">🎁 ДНЕВЕН БОНУС<br><small>+5€ веднъж на ден</small></div>
<div class="banner jackpotBanner">💰 JACKPOT<br><span
