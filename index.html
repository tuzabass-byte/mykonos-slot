<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mykonos Casino</title>

<style>
body{
margin:0;
font-family:Arial;
background:
linear-gradient(rgba(0,0,0,.8),rgba(0,0,0,.9)),
url("https://images.unsplash.com/photo-1511512578047-dfb367046420");
background-size:cover;
background-position:center;
color:white;
}

/* container */
.app{
max-width:430px;
margin:auto;
padding:15px;
}

/* header */
.logo{
text-align:center;
font-size:28px;
font-weight:900;
color:#ffcc00;
text-shadow:0 0 10px red;
margin-bottom:10px;
}

/* panel */
.panel{
background:rgba(0,0,0,.7);
border:2px solid #ffcc00;
border-radius:12px;
padding:10px;
margin-bottom:10px;
}

/* balance */
.balance{
text-align:center;
font-size:20px;
font-weight:900;
}

/* games */
.games{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-top:10px;
}

.game{
background:#111;
border:2px solid #ffcc00;
border-radius:10px;
padding:10px;
text-align:center;
font-size:12px;
cursor:pointer;
}

.game:hover{
background:#222;
}

/* chat */
.chat{
height:180px;
overflow:auto;
border:1px solid #555;
padding:5px;
margin:10px 0;
background:#000;
}

.msg{
font-size:13px;
margin:3px 0;
}

.name{
color:#ffcc00;
font-weight:900;
}

/* input */
.inputRow{
display:flex;
gap:5px;
}

input{
flex:1;
padding:10px;
border-radius:8px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#ffcc00;
font-weight:900;
}

/* bonus */
.bonus{
background:linear-gradient(45deg,#ffcc00,#ff6600);
color:black;
font-weight:900;
text-align:center;
padding:8px;
border-radius:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="app">

<div class="logo">🎰 MYKONOS CASINO</div>

<div class="panel">
<div id="welcome"></div>
<div class="balance">Баланс: <span id="bal">0</span>€</div>
</div>

<div class="bonus" onclick="dailyBonus()">🎁 ДНЕВЕН БОНУС</div>

<div class="panel">
<div><b>🎮 ИГРИ</b></div>

<div class="games">
<div class="game">VASA</div>
<div class="game">DIDI</div>
<div class="game">MITKO</div>
</div>
</div>

<div class="panel">
<div><b>💬 ЧАТ</b></div>

<div class="chat" id="chat"></div>

<div class="inputRow">
<input id="msg" placeholder="пиши...">
<button onclick="sendMsg()">SEND</button>
</div>
</div>

</div>

<script>
const URL="https://xjcvntplrbjsaozkduqd.supabase.co/rest/v1/";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqY3ZudHBscmJqc2FvemtkdXFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTAzNzgsImV4cCI6MjA5MjM2NjM3OH0.R3-y_nHTDpXc0MCESafhS8XE-MtgE4-4V42ac7Z7gdo";

let user={Name:"Vasilka",Points:80}; // временно

document.getElementById("welcome").innerText="Здравей, "+user.Name;
document.getElementById("bal").innerText=user.Points;

async function sendMsg(){
let text=document.getElementById("msg").value;
if(!text)return;

await fetch(URL+"chat_messages",{
method:"POST",
headers:{apikey:KEY,"Content-Type":"application/json"},
body:JSON.stringify({
player_name:user.Name,
message:text
})
});

document.getElementById("msg").value="";
}

async function loadChat(){
let r=await fetch(URL+"chat_messages?order=created_at.desc&limit=20",{headers:{apikey:KEY}});
let data=await r.json();

let html="";
data.reverse().forEach(x=>{
html+=`<div class="msg"><span class="name">${x.player_name}:</span> ${x.message}</div>`;
});

document.getElementById("chat").innerHTML=html;
}

function dailyBonus(){
user.Points+=5;
document.getElementById("bal").innerText=user.Points;
alert("Взе +5€ бонус");
}

setInterval(loadChat,2000);
</script>

</body>
</html>
