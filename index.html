<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mykonos Hot</title>

<style>
body{font-family:Arial;background:#111;color:#fff;text-align:center;}
.wrap{max-width:400px;margin:auto;padding:10px;}

input,button,select{
width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none;
}

button{background:gold;font-weight:bold;}

.reels{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
.reel{display:grid;grid-template-rows:repeat(3,70px);gap:5px;}
.cell{background:#000;border:2px solid gold;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;}

.hidden{display:none;}
</style>
</head>

<body>

<div class="wrap">

<div id="login">
<h2>🔥 Mykonos Hot 🔥</h2>
<input id="name" placeholder="Име">
<button onclick="login()">Вход</button>
</div>

<div id="game" class="hidden">

<div id="coins"></div>
<div id="free"></div>

<select id="bet">
<option value="10">10</option>
<option value="20">20</option>
<option value="50">50</option>
</select>

<button onclick="spin()">SPIN</button>

<div class="reels" id="reels"></div>

<div id="msg"></div>

</div>

</div>

<script>

let coins=1000;
let free=0;
let player="";

const symbols=["7️⃣","🍒","🍋","🍇","🔔","BAR","💥"];

function login(){
player=document.getElementById("name").value;
if(!player)return;

let saved=localStorage.getItem(player);

if(saved) coins=parseInt(saved);

document.getElementById("login").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");

update();
draw(random());
}

function update(){
coinsEl.textContent="Coins: "+coins;
freeEl.textContent="Free: "+free;
}

function random(){
let m=[];
for(let r=0;r<3;r++){
let row=[];
for(let c=0;c<5;c++){
row.push(symbols[Math.floor(Math.random()*symbols.length)]);
}
m.push(row);
}
return m;
}

function draw(m){
reels.innerHTML="";
for(let c=0;c<5;c++){
let reel=document.createElement("div");
reel.className="reel";
for(let r=0;r<3;r++){
let cell=document.createElement("div");
cell.className="cell";
cell.textContent=m[r][c];
reel.appendChild(cell);
}
reels.appendChild(reel);
}
}

function spin(){

let bet=+betEl.value;

if(free>0) free--;
else{
if(coins<bet){msg("Нямаш coins");return;}
coins-=bet;
}

let m=random();
draw(m);

let win=Math.floor(Math.random()*100);

if(win>50){
coins+=win;
msg("Печалба "+win);
} else msg("Нищо");

if(Math.random()<0.2){
free+=5;
msg("FREE SPINS +5");
}

localStorage.setItem(player,coins);
update();
}

function msg(t){
msgEl.textContent=t;
}

</script>

</body>
</html>
