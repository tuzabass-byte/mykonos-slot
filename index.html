<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friends Bet Casino</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:radial-gradient(circle at top,#123b85,#02020a 55%);
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#000a;
}

.logo{font-size:28px;font-weight:bold}
.friends{color:#00d9ff}
.bet{color:red}
.casino{color:gold}

.menu button{
  margin-left:10px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
  cursor:pointer;
}

/* PROFILE */
.profile{
  text-align:center;
  margin:20px;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px;
}
.hero h1{font-size:40px}
.hero button{
  padding:15px 25px;
  background:red;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* BANNERS */
.banners{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  width:90%;
  margin:20px auto;
}

.banner{
  background:#111;
  padding:20px;
  border-radius:15px;
}

/* GAMES */
.games{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  width:90%;
  margin:40px auto;
}

.game-card{
  height:260px;
  border-radius:20px;
  padding:20px;
  position:relative;
  cursor:pointer;
  background:#111;
  transition:.3s;
}

.game-card:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px red;
}

.tag{
  position:absolute;
  top:10px;
  right:10px;
  padding:5px 10px;
  border-radius:8px;
  font-size:12px;
}

.hot{background:red}
.new{background:#00d9ff;color:black}
.vip{background:gold;color:black}

.game-cover{text-align:center;margin-top:40px}
.big-icon{font-size:60px}

.play-btn{
  position:absolute;
  bottom:15px;
  left:15px;
  right:15px;
  padding:10px;
  background:red;
  text-align:center;
  border-radius:10px;
}

/* CHAT */
.chat{
  width:90%;
  margin:30px auto;
}

.messages{
  height:200px;
  background:#111;
  padding:10px;
  overflow:auto;
}

input{
  padding:10px;
  width:70%;
}

.footer{
  text-align:center;
  padding:20px;
  opacity:0.7;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:#000c;
  justify-content:center;
  align-items:center;
}

.box{
  background:#111;
  padding:20px;
  border-radius:15px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">
    <span class="friends">Friends</span>
    <span class="bet">Bet</span>
    <span class="casino">Casino</span>
  </div>

  <div class="menu">
    <button onclick="openModal('login')">Вход</button>
    <button onclick="openModal('register')">Регистрация</button>
    <button onclick="logout()">Изход</button>
  </div>
</div>

<div class="profile">
  <div id="user">Не си влязъл</div>
  <div id="balance">Баланс: 0</div>
</div>

<div class="hero">
  <h1>Добре дошъл бонус</h1>
  <button onclick="claimBonus()">ВЗЕМИ 10 000</button>
</div>

<div class="banners">
  <div class="banner">🎁 Дневен бонус</div>
  <div class="banner">👥 Покани приятел +5€</div>
  <div class="banner">🎟️ Промо код FRIENDS5</div>
</div>

<h2 style="text-align:center;">Игри</h2>

<div class="games">

  <div class="game-card" onclick="openGame('vasa-fortune.html')">
    <div class="tag hot">HOT</div>
    <div class="game-cover">
      <div class="big-icon">🎰</div>
      <h3>Vasa Fortune</h3>
    </div>
    <div class="play-btn">ИГРАЙ</div>
  </div>

  <div class="game-card" onclick="openGame('didi-blitz.html')">
    <div class="tag new">NEW</div>
    <div class="game-cover">
      <div class="big-icon">⚡</div>
      <h3>Didi Blitz</h3>
    </div>
    <div class="play-btn">ИГРАЙ</div>
  </div>

  <div class="game-card" onclick="openGame('mitko-koch-bells.html')">
    <div class="tag vip">VIP</div>
    <div class="game-cover">
      <div class="big-icon">🔔</div>
      <h3>Mitko Koch Bells</h3>
    </div>
    <div class="play-btn">ИГРАЙ</div>
  </div>

</div>

<div class="chat">
  <h2>Чат</h2>
  <div class="messages" id="messages"></div>
  <input id="msg">
  <button onclick="send()">Изпрати</button>
</div>

<div class="footer">
Демо казино • Без реални пари
</div>

<!-- LOGIN -->
<div class="modal" id="login">
  <div class="box">
    <input id="lEmail" placeholder="Имейл"><br><br>
    <input id="lPass" type="password" placeholder="Парола"><br><br>
    <button onclick="login()">Вход</button>
  </div>
</div>

<!-- REGISTER -->
<div class="modal" id="register">
  <div class="box">
    <input id="rName" placeholder="Име"><br><br>
    <input id="rEmail" placeholder="Имейл"><br><br>
    <input id="rPass" type="password" placeholder="Парола"><br><br>
    <button onclick="register()">Регистрация</button>
  </div>
</div>

<script>
function getUsers(){
  return JSON.parse(localStorage.getItem("users")||"{}");
}
function saveUsers(u){
  localStorage.setItem("users",JSON.stringify(u));
}
function getCurrent(){
  return localStorage.getItem("user");
}

function openModal(id){
  document.getElementById(id).style.display="flex";
}

function register(){
  let name=rName.value;
  let email=rEmail.value;
  let pass=rPass.value;

  let users=getUsers();

  users[email]={name,pass,balance:10000};
  saveUsers(users);

  localStorage.setItem("user",email);
  update();
}

function login(){
  let email=lEmail.value;
  let pass=lPass.value;

  let users=getUsers();

  if(users[email] && users[email].pass==pass){
    localStorage.setItem("user",email);
    update();
  }else alert("грешка");
}

function logout(){
  localStorage.removeItem("user");
  update();
}

function claimBonus(){
  let u=getCurrent();
  if(!u) return alert("влез първо");

  let users=getUsers();
  users[u].balance+=10000;
  saveUsers(users);
  update();
}

function openGame(file){
  if(!getCurrent()) return alert("влез първо");
  window.location.href=file;
}

function update(){
  let u=getCurrent();
  let users=getUsers();

  if(u){
    user.innerText="Добре дошъл "+users[u].name;
    balance.innerText="Баланс: "+users[u].balance;
  }else{
    user.innerText="Не си влязъл";
    balance.innerText="Баланс: 0";
  }
}

function send(){
  let text=msg.value;
  let u=getCurrent();
  if(!u) return;

  messages.innerHTML+="<div>"+u+": "+text+"</div>";
  msg.value="";
}

update();
</script>

</body>
</html>
