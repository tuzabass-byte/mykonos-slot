<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friends Bet Casino</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:radial-gradient(circle at top,#123b85,#02020a 55%);
}
.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#000a;
}
.logo{font-size:28px;font-weight:bold}
.friends{color:#00d9ff}
.bet{color:red}
.casino{color:gold}
.menu button{
  margin-left:10px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
  cursor:pointer;
}
.profile{text-align:center;margin:20px}
.hero{text-align:center;padding:40px}
.hero h1{font-size:40px}
.hero button{
  padding:15px 25px;
  background:red;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}
.banners{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  width:90%;
  margin:20px auto;
}
.banner{
  background:#111;
  padding:20px;
  border-radius:15px;
}
.games{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  width:90%;
  margin:40px auto;
}
.game-card{
  height:260px;
  border-radius:20px;
  padding:20px;
  position:relative;
  cursor:pointer;
  background:#111;
  transition:.3s;
}
.game-card:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px red;
}
.tag{
  position:absolute;
  top:10px;
  right:10px;
  padding:5px 10px;
  border-radius:8px;
  font-size:12px;
}
.hot{background:red}
.new{background:#00d9ff;color:black}
.vip{background:gold;color:black}
.game-cover{text-align:center;margin-top:40px}
.big-icon{font-size:60px}
.play-btn{
  position:absolute;
  bottom:15px;
  left:15px;
  right:15px;
  padding:10px;
  background:red;
  text-align:center;
  border-radius:10px;
}
.chat{
  width:90%;
  margin:30px auto;
}
.messages{
  height:200px;
  background:#111;
  padding:10px;
  overflow:auto;
}
input{
  padding:10px;
  width:70%;
}
.footer{
  text-align:center;
  padding:20px;
  opacity:0.7;
}
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:#000c;
  justify-content:center;
  align-items:center;
  z-index:99;
}
.box{
  background:#111;
  padding:20px;
  border-radius:15px;
}
.box button{
  padding:10px 18px;
  background:red;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.close{
  background:#333!important;
  margin-left:10px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">
    <span class="friends">Friends</span>
    <span class="bet">Bet</span>
    <span class="casino">Casino</span>
  </div>

  <div class="menu">
    <button onclick="openModal('login')">Вход</button>
    <button onclick="logout()">Изход</button>
  </div>
</div>

<div class="profile">
  <div id="user">Не си влязъл</div>
  <div id="balance">Баланс: 0</div>
</div>

<div class="hero">
  <h1>Добре дошъл бонус</h1>
  <button onclick="claimBonus()">ВЗЕМИ 10 000</button>
</div>

<div class="banners">
  <div class="banner">🎁 Дневен бонус</div>
  <div class="banner">👥 Покани приятел +5€</div>
  <div class="banner">🎟️ Промо код FRIENDS5</div>
</div>

<h2 style="text-align:center;">Игри</h2>

<div class="games">

  <div class="game-card" onclick="openGame('FRIENDS_BET_CASINO_v13_FIXED_PAYOUT.html')">
    <div class="tag hot">HOT</div>
    <div class="game-cover">
      <div class="big-icon">🎰</div>
      <h3>Friends Slot</h3>
    </div>
    <div class="play-btn">ИГРАЙ</div>
  </div>

  <div class="game-card" onclick="openGame('didi-blitz.html')">
    <div class="tag new">NEW</div>
    <div class="game-cover">
      <div class="big-icon">⚡</div>
      <h3>Didi Blitz</h3>
    </div>
    <div class="play-btn">ИГРАЙ</div>
  </div>

  <div class="game-card" onclick="openGame('mitko-koch-bells.html')">
    <div class="tag vip">VIP</div>
    <div class="game-cover">
      <div class="big-icon">🔔</div>
      <h3>Mitko Koch Bells</h3>
    </div>
    <div class="play-btn">ИГРАЙ</div>
  </div>

</div>

<div class="chat">
  <h2>Чат</h2>
  <div class="messages" id="messages"></div>
  <input id="msg" placeholder="Напиши съобщение...">
  <button onclick="send()">Изпрати</button>
</div>

<div class="footer">
Демо казино • Без реални пари
</div>

<div class="modal" id="login">
  <div class="box">
    <input id="lName" placeholder="Име"><br><br>
    <input id="lPin" type="password" placeholder="PIN"><br><br>
    <button onclick="login()">Вход</button>
    <button class="close" onclick="closeModal('login')">Затвори</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://xjcvntplrbjsaozkduqd.supabase.co";
const SUPABASE_KEY = "sb_publishable_EmZ_3ANedid8beyhVypb9Q_cGj5RMnq";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentPlayer = JSON.parse(localStorage.getItem("player") || "null");

function openModal(id){
  document.getElementById(id).style.display="flex";
}

function closeModal(id){
  document.getElementById(id).style.display="none";
}

async function login(){
  const name = lName.value.trim();
  const pin = lPin.value.trim();

  if(!name || !pin){
    alert("Въведи име и PIN");
    return;
  }

  const { data, error } = await supabase
    .from("players")
    .select("*")
    .eq("Name", name)
    .eq("Pin", pin)
    .single();

  if(error || !data){
    alert("Грешно име или PIN");
    return;
  }

  currentPlayer = data;
  localStorage.setItem("player", JSON.stringify(data));

  closeModal("login");
  update();
  loadMessages();
}

function logout(){
  localStorage.removeItem("player");
  currentPlayer = null;
  update();
}

async function refreshPlayer(){
  if(!currentPlayer) return;

  const { data, error } = await supabase
    .from("players")
    .select("*")
    .eq("id", currentPlayer.id)
    .single();

  if(!error && data){
    currentPlayer = data;
    localStorage.setItem("player", JSON.stringify(data));
  }
}

async function update(){
  await refreshPlayer();

  if(currentPlayer){
    user.innerText = "Добре дошъл " + currentPlayer.Name;
    balance.innerText = "Баланс: " + currentPlayer.balance;
  }else{
    user.innerText = "Не си влязъл";
    balance.innerText = "Баланс: 0";
  }
}

async function claimBonus(){
  if(!currentPlayer) return alert("Влез първо");

  const newBalance = Number(currentPlayer.balance) + 10000;

  const { error } = await supabase
    .from("players")
    .update({ balance: newBalance })
    .eq("id", currentPlayer.id);

  if(error){
    alert("Грешка при бонуса");
    return;
  }

  currentPlayer.balance = newBalance;
  localStorage.setItem("player", JSON.stringify(currentPlayer));
  update();
}

function openGame(file){
  if(!currentPlayer) return alert("Влез първо");
  window.location.href = file;
}

async function loadMessages(){
  const { data, error } = await supabase
    .from("chat_messages")
    .select("*")
    .order("created_at", { ascending:true })
    .limit(50);

  if(error) return;

  messages.innerHTML = "";
  data.forEach(addMsg);
}

async function send(){
  if(!currentPlayer) return alert("Влез първо");

  const text = msg.value.trim();
  if(!text) return;

  const { error } = await supabase
    .from("chat_messages")
    .insert({
      user: currentPlayer.Name,
      text: text
    });

  if(error){
    alert("Грешка при чата");
    console.log(error);
    return;
  }

  msg.value = "";
}

function addMsg(m){
  messages.innerHTML += `<div><b>${m.user}:</b> ${m.text}</div>`;
  messages.scrollTop = messages.scrollHeight;
}

supabase
  .channel("chat-room")
  .on(
    "postgres_changes",
    { event:"INSERT", schema:"public", table:"chat_messages" },
    payload => addMsg(payload.new)
  )
  .subscribe();

update();
loadMessages();
</script>

</body>
</html>
