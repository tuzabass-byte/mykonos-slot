<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mykonos Casino</title>

<style>
body{
margin:0;
font-family:Arial;
background:#060606;
color:white;
text-align:center;
}

h1{
color:#ffd21f;
text-shadow:0 0 10px red;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#111;
border:2px solid #ffd21f;
border-radius:15px;
padding:20px;
box-shadow:0 0 20px rgba(255,200,0,0.3);
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
}

button{
margin-top:10px;
padding:12px;
font-size:16px;
font-weight:bold;
border:none;
border-radius:10px;
background:red;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🎰 MYKONOS CASINO</h1>

<div class="grid">

<div class="card">
<h2>💎 MYKONOS SLOT PRO</h2>
<p>🔥 Най-добрата игра</p>
<button onclick="openGame('MYKONOS_SLOT_PRO_v2.html')">ИГРАЙ</button>
</div>

<div class="card">
<h2>🎰 FRIENDS SLOT</h2>
<p>Класически слот</p>
<button onclick="openGame('FRIENDS_BET_CASINO_v13_FIXED_PAYOUT.html')">ИГРАЙ</button>
</div>

<div class="card">
<h2>👨‍🍳 CHEF BELLS</h2>
<p>Bonus collect</p>
<button onclick="openGame('CHEFS_GOLDEN_BELLS_v3_FULL_DIFFERENT.html')">ИГРАЙ</button>
</div>

<div class="card">
<h2>🍺 BEER COLLECT</h2>
<p>Hold & Win</p>
<button onclick="openGame('beer-collect-v1.html')">ИГРАЙ</button>
</div>

<div class="card">
<h2>🔔 CHEF CLEAN</h2>
<p>Fast version</p>
<button onclick="openGame('chef-bells-v3-clean-layout.html')">ИГРАЙ</button>
</div>

</div>

<script>
function openGame(file){
window.location.href = "./" + file;
}
</script>

</body>
</html>
